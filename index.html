                value={form.accountName}
                onChange={e => setForm({...form, accountName: e.target.value})}
                className="w-full p-2 border border-gray-200 rounded bg-white"
              >
                <option value="">不綁定</option>
                {bankLikeAccounts.map(a => (
                  <option key={a.id} value={a.name}>{ACCOUNT_TYPE_ICON[a.type]} {a.name}</option>
                ))}
              </select>
            </div>
            <input
              placeholder="備註(選填)"
              value={form.note}
              onChange={e => setForm({...form, note: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded"
            />
            <button onClick={handleSave} className="w-full py-2 bg-blue-500 text-white rounded">
              {editingId ? "更新" : "新增"}
            </button>
          </div>
        )}
      </div>

      {ctx.state.goals.map(g => {
        const isPiggy = g.mode === "piggy";
        const pct = g.target > 0 ? Math.min(100, (g.current / g.target) * 100) : 0;
        const goalEntries = (ctx.state.goalEntries || [])
          .filter(e => e.goalId === g.id)
          .sort((a, b) => b.date.localeCompare(a.date));
        const cur = entry[g.id] || { type: "存入", amount: "", note: "", date: todayStr() };
        const showDetails = showDetailsFor === g.id;
        return (
          <div key={g.id} className="bg-white rounded-2xl shadow-sm p-4 mb-3">
            <div className="flex justify-between items-start mb-2">
              <div className="flex-1 min-w-0">
                <div className="font-semibold flex items-center gap-1">
                  {isPiggy ? "🐷" : "🎯"} {g.name}
                  <span className={`text-[10px] px-1.5 py-0.5 rounded ${isPiggy ? "bg-pink-100 text-pink-600" : "bg-blue-100 text-blue-600"}`}>
                    {isPiggy ? "存錢筒" : "目標"}
                  </span>
                </div>
                {g.accountName && (
                  <div className="text-[11px] text-blue-500">💳 綁定:{g.accountName}</div>
                )}
                {g.note && <div className="text-xs text-gray-500">{g.note}</div>}
              </div>
              <div className="flex gap-1 text-xs">
                <button onClick={() => openEditForm(g)} className="text-blue-500">編輯</button>
                <button
                  onClick={() => confirm("刪除這個目標及其所有明細?") && ctx.removeGoal(g.id)}
                  className="text-gray-400"
                >刪除</button>
              </div>
            </div>
            {isPiggy ? (
              <div className="bg-gradient-to-r from-pink-50 to-rose-50 rounded-lg p-3 mb-3 text-center">
                <div className="text-xs text-gray-500">已存入</div>
                <div className="text-2xl font-bold text-pink-600">{fmtMoney(g.current)}</div>
              </div>
            ) : (
              <>
                <div className="flex justify-between text-sm mb-1">
                  <span className="text-gray-600">{fmtMoney(g.current)} / {fmtMoney(g.target)}</span>
                  <span className="font-semibold text-blue-600">{pct.toFixed(1)}%</span>
                </div>
                <div className="h-3 bg-gray-100 rounded-full overflow-hidden mb-3">
                  <div className="h-full bg-gradient-to-r from-green-400 to-blue-400" style={{ width: pct + "%" }} />
                </div>
              </>
            )}
            <div className="space-y-2">
              <div className="flex gap-1">
                <button
                  onClick={() => setEntry({...entry, [g.id]: {...cur, type: "存入"}})}
                  className={`flex-1 py-1.5 rounded text-sm ${cur.type === "存入" ? "bg-green-500 text-white" : "bg-gray-100"}`}
                >存入</button>
                <button
                  onClick={() => setEntry({...entry, [g.id]: {...cur, type: "提出"}})}
                  className={`flex-1 py-1.5 rounded text-sm ${cur.type === "提出" ? "bg-orange-500 text-white" : "bg-gray-100"}`}
                >提出</button>
              </div>
              <div className="flex gap-2">
                <input
                  type="number"
                  placeholder="金額"
                  value={cur.amount}
                  onChange={e => setEntry({...entry, [g.id]: {...cur, amount: e.target.value}})}
                  className="flex-1 p-2 border border-gray-200 rounded text-sm"
                />
                <input
                  type="date"
                  value={cur.date || todayStr()}
                  onChange={e => setEntry({...entry, [g.id]: {...cur, date: e.target.value}})}
                  className="p-2 border border-gray-200 rounded text-xs"
                />
              </div>
              <input
                placeholder={cur.type === "提出" ? "提出備註(必填較佳)" : "備註(選填)"}
                value={cur.note}
                onChange={e => setEntry({...entry, [g.id]: {...cur, note: e.target.value}})}
                className="w-full p-2 border border-gray-200 rounded text-sm"
              />
              <button
                onClick={() => submitEntry(g.id)}
                className="w-full py-2 bg-blue-500 text-white rounded text-sm"
              >送出 {cur.type || "存入"}</button>
            </div>

            <div className="mt-3 border-t pt-2">
              <button
                onClick={() => setShowDetailsFor(showDetails ? null : g.id)}
                className="w-full text-xs text-gray-500 flex items-center justify-between"
              >
                <span>明細 ({goalEntries.length})</span>
                <span>{showDetails ? "▼" : "▶"}</span>
              </button>
              {showDetails && (
                <div className="mt-2 space-y-1 max-h-60 overflow-y-auto">
                  {goalEntries.length === 0 ? (
                    <div className="text-xs text-gray-400 text-center py-2">還沒有明細</div>
                  ) : goalEntries.map(e => (
                    <div key={e.id} className="flex items-center justify-between text-xs p-2 bg-gray-50 rounded">
                      <div className="flex-1 min-w-0">
                        <span className={`font-medium ${e.type === "存入" ? "text-green-600" : "text-orange-500"}`}>
                          {e.type === "存入" ? "+" : "-"}{fmtMoney(e.amount)}
                        </span>
                        <span className="text-gray-400 ml-2">{e.date}</span>
                        {e.accountName && <span className="text-blue-500 ml-1">@{e.accountName}</span>}
                        {e.note && <div className="text-gray-500 truncate">{e.note}</div>}
                      </div>
                      <button
                        onClick={() => confirm("刪除這筆明細?") && ctx.removeGoalEntry(e.id)}
                        className="text-red-400 ml-2"
                      >×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })}
    </>
  );
}

function InstallmentSection({ ctx, groups }) {
  const groupList = Object.entries(groups);

  // 計算全部分期的總額 + 剩餘 + 額外手續費/利息
  const today = todayStr();
  let totalAll = 0, totalRemain = 0, groupCount = 0;
  let totalFee = 0, totalInterest = 0;
  groupList.forEach(([, g]) => {
    groupCount++;
    g.items.forEach(it => {
      totalAll += it.amount;
      if (it.date > today) totalRemain += it.amount;
    });
    const first = g.items.find(it => it.installmentFee !== undefined || it.installmentEstInterest !== undefined);
    if (first) {
      totalFee += parseFloat(first.installmentFee) || 0;
      totalInterest += parseFloat(first.installmentEstInterest) || 0;
    }
  });

  if (groupList.length === 0) {
    return (
      <div className="bg-white rounded-2xl shadow-sm p-8 text-center text-gray-400">
        尚無分期紀錄。到「記帳」頁勾選分期付款即可建立。
      </div>
    );
  }

  return (
    <>
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-3">
        <h3 className="font-semibold text-gray-700 mb-2">分期總覽({groupCount} 筆)</h3>
        <div className="grid grid-cols-2 gap-2">
          <div className="bg-gradient-to-br from-blue-50 to-purple-50 rounded-lg p-3 text-center">
            <div className="text-xs text-gray-500">全部分期總額</div>
            <div className="font-bold text-blue-600 text-lg">{fmtMoney(totalAll)}</div>
          </div>
          <div className="bg-gradient-to-br from-orange-50 to-red-50 rounded-lg p-3 text-center">
            <div className="text-xs text-gray-500">剩餘未繳</div>
            <div className="font-bold text-orange-600 text-lg">{fmtMoney(totalRemain)}</div>
          </div>
        </div>
        <div className="mt-2 text-center text-xs text-gray-500">
          已繳 {fmtMoney(totalAll - totalRemain)} / 完成度 {totalAll > 0 ? ((totalAll - totalRemain) / totalAll * 100).toFixed(1) : 0}%
        </div>
        <div className="h-2 bg-gray-100 rounded-full overflow-hidden mt-2">
          <div
            className="h-full bg-gradient-to-r from-green-400 to-blue-400"
            style={{ width: totalAll > 0 ? ((totalAll - totalRemain) / totalAll * 100) + "%" : "0%" }}
          />
        </div>
        {(totalFee > 0 || totalInterest > 0) && (
          <div className="mt-3 pt-3 border-t grid grid-cols-2 gap-2 text-xs">
            <div className="bg-yellow-50 rounded p-2 text-center">
              <div className="text-gray-500">額外手續費</div>
              <div className="font-semibold text-yellow-600">{fmtMoney(totalFee)}</div>
            </div>
            <div className="bg-red-50 rounded p-2 text-center">
              <div className="text-gray-500">估計利息</div>
              <div className="font-semibold text-red-500">{fmtMoney(totalInterest)}</div>
            </div>
          </div>
        )}
      </div>

      {groupList.map(([id, g]) => {
        const sorted = [...g.items].sort((a,b) => a.date.localeCompare(b.date));
        const today = todayStr();
        const paid = sorted.filter(t => t.date <= today);
        const remaining = sorted.filter(t => t.date > today);
        const total = sorted.reduce((s,t) => s + t.amount, 0);
        const meta = sorted.find(t => t.installmentFee !== undefined || t.installmentRate !== undefined || t.installmentEstInterest !== undefined);
        const groupFee = meta ? parseFloat(meta.installmentFee) || 0 : 0;
        const groupRate = meta ? parseFloat(meta.installmentRate) || 0 : 0;
        const groupInt = meta ? parseFloat(meta.installmentEstInterest) || 0 : 0;
        return (
          <div key={id} className="bg-white rounded-2xl shadow-sm p-4 mb-3">
            <div className="flex justify-between items-start mb-2">
              <div>
                <div className="font-semibold">{g.note || g.category}</div>
                <div className="text-xs text-gray-500">
                  {g.account}
                  {groupRate > 0 && <span className="ml-1 text-red-400">· 年利率 {groupRate}%</span>}
                  {groupFee > 0 && <span className="ml-1 text-yellow-500">· 手續費 {fmtMoney(groupFee)}</span>}
                  {groupInt > 0 && <span className="ml-1 text-red-400">· 估利息 {fmtMoney(groupInt)}</span>}
                </div>
              </div>
              <button
                onClick={() => confirm("刪除整組分期?") && ctx.deleteInstallmentGroup(id)}
                className="text-xs text-red-400"
              >刪除</button>
            </div>
            <div className="grid grid-cols-3 gap-2 text-sm mb-2">
              <div className="bg-gray-50 rounded p-2 text-center">
                <div className="text-xs text-gray-500">總額</div>
                <div className="font-semibold">{fmtMoney(total)}</div>
              </div>
              <div className="bg-green-50 rounded p-2 text-center">
                <div className="text-xs text-gray-500">已繳 {paid.length}/{sorted.length}</div>
                <div className="font-semibold text-green-600">{fmtMoney(paid.reduce((s,t) => s+t.amount,0))}</div>
              </div>
              <div className="bg-orange-50 rounded p-2 text-center">
                <div className="text-xs text-gray-500">剩 {remaining.length} 期</div>
                <div className="font-semibold text-orange-600">{fmtMoney(remaining.reduce((s,t) => s+t.amount,0))}</div>
              </div>
            </div>
            <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
              <div
                className="h-full bg-gradient-to-r from-green-400 to-blue-400"
                style={{ width: (paid.length/sorted.length*100) + "%" }}
              />
            </div>
            {remaining.length > 0 && (
              <div className="text-xs text-gray-500 mt-2">
                下次扣款:{remaining[0].date} · {fmtMoney(remaining[0].amount)}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

// ===================== 台股紀錄 =====================
function StocksSection({ ctx }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ symbol: "", name: "", shares: "", cost: "", price: "", note: "" });

  const reset = () => {
    setForm({ symbol: "", name: "", shares: "", cost: "", price: "", note: "" });
    setShowAdd(false);
    setEditingId(null);
  };

  const save = () => {
    if (!form.symbol || !form.name) { alert("請輸入代號和名稱"); return; }
    const data = {
      symbol: form.symbol,
      name: form.name,
      shares: parseFloat(form.shares) || 0,
      cost: parseFloat(form.cost) || 0,
      price: parseFloat(form.price) || 0,
      note: form.note || ""
    };
    if (editingId) ctx.updateStock(editingId, data);
    else ctx.addStock(data);
    reset();
  };

  const startEdit = (st) => {
    setForm({
      symbol: st.symbol, name: st.name,
      shares: st.shares, cost: st.cost, price: st.price,
      note: st.note || ""
    });
    setEditingId(st.id);
    setShowAdd(true);
  };

  const totalCost = ctx.state.stocks.reduce((s, st) => s + (st.cost * st.shares), 0);
  const totalValue = ctx.state.stocks.reduce((s, st) => s + (st.price * st.shares), 0);
  const totalPL = totalValue - totalCost;
  const plPct = totalCost > 0 ? (totalPL / totalCost * 100) : 0;

  return (
    <>
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <div className="flex justify-between items-center mb-3">
          <h3 className="font-semibold text-gray-700">投資總覽</h3>
          <button
            onClick={() => showAdd ? reset() : setShowAdd(true)}
            className="text-sm text-blue-500"
          >{showAdd ? "取消" : "+ 新增持股"}</button>
        </div>

        <div className={`rounded-xl p-4 text-center mb-3 ${totalPL >= 0 ? "bg-gradient-to-r from-red-50 to-pink-50" : "bg-gradient-to-r from-green-50 to-teal-50"}`}>
          <div className="text-xs text-gray-500">總損益</div>
          <div className={`text-2xl font-bold mt-1 ${totalPL >= 0 ? "text-red-500" : "text-green-600"}`}>
            {totalPL >= 0 ? "+" : ""}{fmtMoney(totalPL)}
          </div>
          <div className={`text-sm mt-1 ${totalPL >= 0 ? "text-red-400" : "text-green-500"}`}>
            {plPct >= 0 ? "+" : ""}{plPct.toFixed(2)}%
          </div>
        </div>

        <div className="grid grid-cols-2 gap-2">
          <div className="bg-gray-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">成本</div>
            <div className="font-semibold">{fmtMoney(totalCost)}</div>
          </div>
          <div className="bg-gray-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">市值</div>
            <div className="font-semibold">{fmtMoney(totalValue)}</div>
          </div>
        </div>
      </div>

      {showAdd && (
        <div className="bg-blue-50 rounded-2xl p-4 mb-4 space-y-2">
          <div className="font-semibold text-sm mb-2">{editingId ? "編輯持股" : "新增持股"}</div>
          <div className="grid grid-cols-2 gap-2">
            <input
              placeholder="代號 (例 2330)"
              value={form.symbol}
              onChange={e => setForm({...form, symbol: e.target.value})}
              className="p-2 border border-gray-200 rounded text-sm"
            />
            <input
              placeholder="名稱 (例 台積電)"
              value={form.name}
              onChange={e => setForm({...form, name: e.target.value})}
              className="p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <input
            type="number"
            placeholder="股數"
            value={form.shares}
            onChange={e => setForm({...form, shares: e.target.value})}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
          <div className="grid grid-cols-2 gap-2">
            <input
              type="number"
              placeholder="平均成本 /股"
              step="0.01"
              value={form.cost}
              onChange={e => setForm({...form, cost: e.target.value})}
              className="p-2 border border-gray-200 rounded text-sm"
            />
            <input
              type="number"
              placeholder="現價 /股"
              step="0.01"
              value={form.price}
              onChange={e => setForm({...form, price: e.target.value})}
              className="p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <textarea
            placeholder="備註"
            rows="2"
            value={form.note}
            onChange={e => setForm({...form, note: e.target.value})}
            className="w-full p-2 border border-gray-200 rounded text-sm resize-none"
          />
          <button onClick={save} className="w-full py-2 bg-blue-500 text-white rounded text-sm">
            {editingId ? "更新" : "新增"}
          </button>
        </div>
      )}

      {ctx.state.stocks.length === 0 ? (
        <div className="bg-white rounded-2xl shadow-sm p-8 text-center text-gray-400 text-sm">
          還沒有持股紀錄。點上方「+ 新增持股」開始記錄。
        </div>
      ) : (
        <div className="space-y-2">
          {ctx.state.stocks.map(st => {
            const cost = st.cost * st.shares;
            const value = st.price * st.shares;
            const pl = value - cost;
            const plPct = cost > 0 ? (pl / cost * 100) : 0;
            return (
              <div key={st.id} className="bg-white rounded-2xl shadow-sm p-4">
                <div className="flex justify-between items-start mb-2">
                  <div>
                    <div className="flex items-center gap-2">
                      <span className="font-bold text-gray-800">{st.symbol}</span>
                      <span className="text-sm text-gray-600">{st.name}</span>
                    </div>
                    <div className="text-xs text-gray-500 mt-0.5">
                      {st.shares} 股 · 成本 ${st.cost.toFixed(2)} · 現價 ${st.price.toFixed(2)}
                    </div>
                    {st.note && <div className="text-xs text-gray-400 mt-0.5">{st.note}</div>}
                  </div>
                  <div className="flex flex-col items-end gap-1">
                    <div className={`font-bold ${pl >= 0 ? "text-red-500" : "text-green-600"}`}>
                      {pl >= 0 ? "+" : ""}{fmtMoney(pl)}
                    </div>
                    <div className={`text-xs ${pl >= 0 ? "text-red-400" : "text-green-500"}`}>
                      {plPct >= 0 ? "+" : ""}{plPct.toFixed(2)}%
                    </div>
                  </div>
                </div>
                <div className="flex gap-2 mt-2 pt-2 border-t border-gray-100">
                  <button
                    onClick={() => startEdit(st)}
                    className="flex-1 py-1.5 bg-gray-100 rounded text-xs text-gray-700"
                  >編輯</button>
                  <button
                    onClick={() => {
                      const newPrice = prompt(`更新 ${st.name} 的現價`, st.price);
                      if (newPrice !== null && !isNaN(parseFloat(newPrice))) {
                        ctx.updateStock(st.id, { price: parseFloat(newPrice) });
                      }
                    }}
                    className="flex-1 py-1.5 bg-blue-50 rounded text-xs text-blue-600"
                  >更新現價</button>
                  <button
                    onClick={() => confirm(`刪除 ${st.name}?`) && ctx.removeStock(st.id)}
                    className="flex-1 py-1.5 bg-red-50 rounded text-xs text-red-500"
                  >刪除</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div className="bg-yellow-50 rounded-xl p-3 mt-3 text-xs text-gray-600">
        💡 小提示:現價需要手動更新。可到證券交易所、券商 App 查到最新價後,點「更新現價」輸入即可。
      </div>
    </>
  );
}

  const grouped = allTypes.reduce((acc, t) => {

    setEditingId(acc.id);

    if (!form.name) { alert("請輸入帳戶名稱"); return; }

    } else {
      ctx.addAccount(form);

    setAddingType(null);

  const cancelForm = () => { setEditingId(null); setAddingType(null); setForm({}); };

            />

              onChange={e => setNewTypeForm({...newTypeForm, name: e.target.value})}

                setNewTypeForm({ name: "", icon: "📦" });
              }}
              className="px-3 bg-blue-500 text-white rounded text-sm"
            >新增</button>
          </div>

          {(ctx.state.customAccountTypes || []).length > 0 && (
            <div>
              <div className="text-xs text-gray-600 font-medium mt-2 mb-1">自訂類型</div>
              <div className="space-y-1">
                {(ctx.state.customAccountTypes || []).map(c => (
                  <div key={c.name} className="bg-white rounded p-2">
                    {editingType === c.name ? (
                      <div className="flex gap-1 items-center">
                        <input
                          value={editTypeForm.icon}
                          maxLength="2"
                          onChange={e => setEditTypeForm({...editTypeForm, icon: e.target.value})}
                          className="w-10 p-1 border rounded text-center text-sm"
                        />
                        <input
                          value={editTypeForm.name}
                          onChange={e => setEditTypeForm({...editTypeForm, name: e.target.value})}
                          className="flex-1 p-1 border rounded text-sm"
                        />
                        <button
                          onClick={() => {
                            ctx.updateAccountType(c.name, editTypeForm.name.trim(), editTypeForm.icon);
                            setEditingType(null);
                          }}
                          className="px-2 py-1 bg-green-500 text-white rounded text-xs"
                        >存</button>
                        <button
                          onClick={() => setEditingType(null)}
                          className="px-2 py-1 bg-gray-200 rounded text-xs"
                        >取消</button>
                      </div>
                    ) : (
                      <div className="flex items-center justify-between">
                        <span className="text-sm">{c.icon} {c.name}</span>
                        <div className="flex gap-1">
                          <button
                            onClick={() => { setEditingType(c.name); setEditTypeForm({ name: c.name, icon: c.icon }); }}
                            className="text-xs text-blue-500"
                          >編輯</button>
                          <button
                            onClick={() => confirm(`刪除類型「${c.name}」?`) && ctx.removeAccountType(c.name)}
                            className="text-xs text-red-400"
                          >刪除</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          <div>
            <div className="text-xs text-gray-600 font-medium mt-2 mb-1">內建類型(可改名/換圖示/隱藏)</div>
            <div className="space-y-1">
              {BUILTIN_ACCOUNT_TYPES.map(t => {
                const isHidden = hiddenTypeNames.includes(t);
                const used = ctx.state.accounts.some(a => a.type === t);
                const curIcon = ACCOUNT_TYPE_ICON[t] || BUILTIN_ACCOUNT_TYPE_ICON[t];
                const curLabel = ACCOUNT_TYPE_LABEL[t] || t;
                const isEditing = editingType === "__builtin__:" + t;
                return (
                  <div key={t} className="bg-white rounded p-2">
                    {isEditing ? (
                      <div className="flex gap-1 items-center">
                        <input
                          value={editTypeForm.icon}
                          maxLength="2"
                          onChange={e => setEditTypeForm({...editTypeForm, icon: e.target.value})}
                          className="w-10 p-1 border rounded text-center text-sm"
                        />
                        <input
                          value={editTypeForm.name}
                          onChange={e => setEditTypeForm({...editTypeForm, name: e.target.value})}
                          className="flex-1 p-1 border rounded text-sm"
                          placeholder={t}
                        />
                        <button
                          onClick={() => {
                            ctx.updateBuiltinAccountType(t, editTypeForm.name.trim(), editTypeForm.icon);
                            setEditingType(null);
                          }}
                          className="px-2 py-1 bg-green-500 text-white rounded text-xs"
                        >存</button>
                        <button
                          onClick={() => { ctx.updateBuiltinAccountType(t, "", ""); setEditingType(null); }}
                          className="px-2 py-1 bg-gray-200 rounded text-xs"
                          title="還原為預設名稱和圖示"
                        >還原</button>
                        <button
                          onClick={() => setEditingType(null)}
                          className="px-2 py-1 bg-gray-200 rounded text-xs"
                        >取消</button>
                      </div>
                    ) : (
                      <div className="flex items-center justify-between">
                        <span className={`text-sm ${isHidden ? "text-gray-400 line-through" : ""}`}>
                          {curIcon} {curLabel}
                          {curLabel !== t && <span className="text-[10px] text-gray-400 ml-1">(原:{t})</span>}
                        </span>
                        <div className="flex gap-1">
                          <button
                            onClick={() => { setEditingType("__builtin__:" + t); setEditTypeForm({ name: curLabel, icon: curIcon }); }}
                            className="text-xs text-blue-500"
                          >編輯</button>
                          <button
                            onClick={() => ctx.toggleHiddenAccountType(t)}
                            disabled={!isHidden && used}
                            className={`text-xs ${!isHidden && used ? "text-gray-300" : (isHidden ? "text-green-500" : "text-gray-400")}`}
                          >{isHidden ? "顯示" : "隱藏"}</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <div className="text-[10px] text-gray-400 mt-1">改名/換圖示只影響顯示,信用卡、貸款等內部邏輯仍會正確運作。有帳戶的類型無法隱藏。</div>
          </div>
        </div>
      )}

      {allTypes.map(type => (
        <div key={type} className="mb-2 border border-gray-100 rounded-lg overflow-hidden">
          <button
            onClick={() => setExpandedType(expandedType === type ? null : type)}
            className="w-full flex items-center justify-between p-3 bg-gray-50 hover:bg-gray-100 transition"
          >
            <div className="flex items-center gap-2">
              <span className="text-lg">{ACCOUNT_TYPE_ICON[type]}</span>
              <span className="font-medium text-sm">{ACCOUNT_TYPE_LABEL[type]}</span>
              {customTypeNames.includes(type) && (
                <span className="text-[10px] bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded">自訂</span>
              )}
              <span className="text-xs text-gray-500">({grouped[type].length})</span>
            </div>
            <span className="text-gray-400">{expandedType === type ? "▾" : "▸"}</span>
          </button>

          {expandedType === type && (
            <div className="p-2 space-y-2 bg-white">
              {grouped[type].map(a => (
                <div key={a.id} className="p-2 bg-gray-50 rounded">
                  {editingId === a.id ? (
                    <AccountForm
                      form={form} setForm={setForm} type={type}
                      onSave={saveForm} onCancel={cancelForm}
                      onDelete={() => {
                        if (confirm(`刪除 ${a.name}?`)) { ctx.removeAccount(a.id); cancelForm(); }
                      }}
                    />
                  ) : (
                    <div>
                      <div className="flex justify-between items-start">
                        <div className="flex-1 min-w-0">
                          <div className="font-medium text-sm">{a.name}</div>
                          {type === "信用卡" && (a.last4 || a.statementDay) && (
                            <div className="text-xs text-gray-500 mt-0.5">
                              {a.last4 && `末4碼 ${a.last4}`}
                              {a.statementDay && ` · 結帳 ${a.statementDay}`}
                              {a.dueDay && ` · 繳費 ${a.dueDay}`}
                              {a.creditLimit && ` · 額度 ${fmtMoney(a.creditLimit)}`}
                            </div>
                          )}
                          {a.benefits && <div className="text-xs text-blue-600 mt-0.5">{a.benefits}</div>}
                          {a.note && <div className="text-xs text-gray-400 mt-0.5">{a.note}</div>}
                        </div>
                        <button
                          onClick={() => startEdit(a)}
                          className="text-xs text-blue-500 px-2"
                        >編輯</button>
                      </div>
                      {/* 餘額顯示 */}
                      {(() => {
                        const bal = ctx.getAccountBalance(a);
                        if (bal.type === "credit") {
                          const pct = bal.limit > 0 ? Math.min(100, (bal.used / bal.limit) * 100) : 0;
                          return (
                            <div className="mt-2 pt-2 border-t border-gray-200">
                              <div className="flex justify-between text-xs">
                                <span className="text-gray-500">本月已使用</span>
                                <span className="font-semibold text-red-500">-{fmtMoney(bal.used)}</span>
                              </div>
                              {bal.limit > 0 && (
                                <>
                                  <div className="flex justify-between text-xs mt-0.5">
                                    <span className="text-gray-500">可用額度</span>
                                    <span className="font-semibold text-green-600">{fmtMoney(bal.remaining)}</span>
                                  </div>
                                  <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden mt-1">
                                    <div className={`h-full ${pct > 80 ? "bg-red-400" : "bg-blue-400"}`} style={{ width: pct + "%" }} />
                                  </div>
                                </>
                              )}
                            </div>
                          );
                        }
                        if (bal.type === "loan") {
                          const pct = bal.totalRepay > 0 ? Math.min(100, (bal.paid / bal.totalRepay) * 100) : 0;
                          return (
                            <div className="mt-2 pt-2 border-t border-gray-200">
                              <div className="flex justify-between text-xs">
                                <span className="text-gray-500">借款本金</span>
                                <span className="font-semibold">{fmtMoney(bal.principal)}</span>
                              </div>
                              <div className="flex justify-between text-xs mt-0.5">
                                <span className="text-gray-500">每月償還 × {bal.periods}期</span>
                                <span>{fmtMoney(bal.monthly)} ({fmtMoney(bal.totalRepay)})</span>
                              </div>
                              <div className="flex justify-between text-xs mt-0.5">
                                <span className="text-gray-500">已還 / 剩餘</span>
                                <span>
                                  <span className="text-green-600 font-semibold">{fmtMoney(bal.paid)}</span>
                                  <span className="text-gray-400"> / </span>
                                  <span className="text-red-500 font-semibold">{fmtMoney(bal.remaining)}</span>
                                </span>
                              </div>
                              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden mt-1">
                                <div className="h-full bg-gradient-to-r from-green-400 to-blue-400" style={{ width: pct + "%" }} />
                              </div>
                            </div>
                          );
                        }
                        return (
                          <div className="mt-2 pt-2 border-t border-gray-200 flex justify-between items-center">
                            <span className="text-xs text-gray-500">
                              目前餘額
                              {bal.opening > 0 && <span className="text-[10px] ml-1">(初始{fmtMoney(bal.opening)} +收{fmtMoney(bal.income)} -支{fmtMoney(bal.expense)})</span>}
                            </span>
                            <span className={`font-bold text-sm ${bal.balance < 0 ? "text-red-500" : "text-blue-600"}`}>
                              {fmtMoney(bal.balance)}
                            </span>
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              ))}

              {addingType === type ? (
                <div className="p-2 bg-blue-50 rounded">
                  <AccountForm
                    form={form} setForm={setForm} type={type}
                    onSave={saveForm} onCancel={cancelForm}
                  />
                </div>
              ) : (
                !isEditingCard && (
                  <button
                    onClick={() => startAdd(type)}
                    className="w-full p-2 border border-dashed border-gray-300 rounded text-sm text-gray-500 hover:bg-gray-50"
                  >+ 新增 {type}</button>
                )
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function AccountForm({ form, setForm, type, onSave, onCancel, onDelete }) {
  const up = (k, v) => setForm({ ...form, [k]: v });
  return (
    <div className="space-y-2">
      <input
        placeholder="帳戶名稱 *"
        value={form.name || ""}
        onChange={e => up("name", e.target.value)}
        className="w-full p-2 border border-gray-200 rounded text-sm"
      />

      {/* 初始餘額(信用卡以外) */}
      {type !== "信用卡" && (
        <div>
          <div className="text-xs text-gray-500 mb-1">
            初始餘額(現在帳戶/皮夾/卡片裡有多少錢)
          </div>
          <input
            type="number"
            placeholder="例如 3000"
            value={form.openingBalance || ""}
            onChange={e => up("openingBalance", e.target.value)}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
        </div>
      )}

      {type === "信用卡" && (
        <>
          <div className="grid grid-cols-2 gap-2">
            <input
              placeholder="卡號末4碼"
              maxLength="4"
              value={form.last4 || ""}
              onChange={e => up("last4", e.target.value)}
              className="p-2 border border-gray-200 rounded text-sm"
            />
            <input
              placeholder="到期 YYYY/MM"
              value={form.expire || ""}
              onChange={e => up("expire", e.target.value)}
              className="p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div className="grid grid-cols-2 gap-2">
            <input
              type="number"
              placeholder="結帳日 (例 5)"
              value={form.statementDay || ""}
              onChange={e => up("statementDay", e.target.value)}
              className="p-2 border border-gray-200 rounded text-sm"
            />
            <input
              type="number"
              placeholder="繳費日 (例 15)"
              value={form.dueDay || ""}
              onChange={e => up("dueDay", e.target.value)}
              className="p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <input
            type="number"
            placeholder="額度"
            value={form.creditLimit || ""}
            onChange={e => up("creditLimit", e.target.value)}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
          <input
            placeholder="優惠 (例:國外3%、外送5%)"
            value={form.benefits || ""}
            onChange={e => up("benefits", e.target.value)}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
          <input
            type="number"
            placeholder="年費 (0 為免年費)"
            value={form.annualFee || ""}
            onChange={e => up("annualFee", e.target.value)}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
        </>
      )}

      {type === "金融卡" && (
        <div className="grid grid-cols-2 gap-2">
          <input
            placeholder="卡號末4碼"
            maxLength="4"
            value={form.last4 || ""}
            onChange={e => up("last4", e.target.value)}
            className="p-2 border border-gray-200 rounded text-sm"
          />
          <input
            placeholder="到期 YYYY/MM"
            value={form.expire || ""}
            onChange={e => up("expire", e.target.value)}
            className="p-2 border border-gray-200 rounded text-sm"
          />
        </div>
      )}

      {type === "貸款" && (
        <>
          <div className="bg-amber-50 rounded-lg p-2 text-[11px] text-amber-700 mb-1">
            💡 填寫以下欄位,系統會自動每月產生扣款交易
          </div>
          <div>
            <div className="text-xs text-gray-500 mb-1">借款總金額</div>
            <input
              type="number"
              placeholder="例如 500000"
              value={form.loanPrincipal || ""}
              onChange={e => up("loanPrincipal", e.target.value)}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <div className="text-xs text-gray-500 mb-1">每月償還金額</div>
              <input
                type="number"
                placeholder="例如 5015"
                value={form.loanMonthly || ""}
                onChange={e => up("loanMonthly", e.target.value)}
                className="w-full p-2 border border-gray-200 rounded text-sm"
              />
            </div>
            <div>
              <div className="text-xs text-gray-500 mb-1">期數(月)</div>
              <input
                type="number"
                placeholder="例如 120"
                value={form.loanPeriods || ""}
                onChange={e => up("loanPeriods", e.target.value)}
                className="w-full p-2 border border-gray-200 rounded text-sm"
              />
            </div>
          </div>
          <div>
            <div className="text-xs text-gray-500 mb-1">首次還款日</div>
            <input
              type="date"
              value={form.loanStartDate || ""}
              onChange={e => up("loanStartDate", e.target.value)}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div>
            <div className="text-xs text-gray-500 mb-1">利率、備註(選填)</div>
            <input
              placeholder="例如:年利率 4.2%、信貸"
              value={form.benefits || ""}
              onChange={e => up("benefits", e.target.value)}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          {form.loanPrincipal && form.loanMonthly && form.loanPeriods && (
            <div className="bg-blue-50 rounded p-2 text-[11px] text-gray-700">
              總還款:{fmtMoney((parseFloat(form.loanMonthly) || 0) * (parseInt(form.loanPeriods) || 0))}
              (利息估:{fmtMoney((parseFloat(form.loanMonthly) || 0) * (parseInt(form.loanPeriods) || 0) - (parseFloat(form.loanPrincipal) || 0))})
            </div>
          )}
        </>
      )}

      <textarea
        placeholder="備註"
        value={form.note || ""}
        onChange={e => up("note", e.target.value)}
        rows="2"
        className="w-full p-2 border border-gray-200 rounded text-sm resize-none"
      />

      <div className="flex gap-2">
        <button onClick={onSave} className="flex-1 py-2 bg-blue-500 text-white rounded text-sm">儲存</button>
        <button onClick={onCancel} className="px-4 py-2 bg-gray-200 rounded text-sm">取消</button>
        {onDelete && (
          <button onClick={onDelete} className="px-3 py-2 bg-red-50 text-red-500 rounded text-sm">刪除</button>
        )}
      </div>
    </div>
  );
}

// ===================== 主類別管理 =====================
function CategoryManager({ ctx }) {
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name: "", icon: "📌", color: "bg-gray-100 text-gray-700" });
  const [editingName, setEditingName] = useState(null);
  const [subInput, setSubInput] = useState({}); // { catName: "輸入中子類別" }

  const reset = () => {
    setAdding(false); setEditingName(null);
    setForm({ name: "", icon: "📌", color: "bg-gray-100 text-gray-700" });
  };

  const handleSave = () => {
    if (!form.name.trim()) { alert("請輸入類別名稱"); return; }
    if (editingName) {
      ctx.updateCustomCategory(editingName, {
        name: form.name.trim(),
        icon: form.icon,
        color: form.color
      });
    } else {
      ctx.addCustomCategory({
        name: form.name.trim(),
        icon: form.icon,
        color: form.color,
        sub: []
      });
    }
    reset();
  };

  const startEdit = (c) => {
    setForm({ name: c.name, icon: c.icon, color: c.color });
    setEditingName(c.name);
    setAdding(true);
  };

  const hidden = ctx.state.hiddenMainCategories || [];
  const customs = ctx.state.customCategories || [];
  const builtins = Object.keys(CATEGORY_TREE);

  return (
    <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
      <div className="flex justify-between items-center mb-3">
        <h3 className="font-semibold">主類別管理</h3>
        <button
          onClick={() => adding ? reset() : setAdding(true)}
          className="text-sm text-blue-500"
        >{adding ? "取消" : "+ 新增類別"}</button>
      </div>

      {adding && (
        <div className="p-3 bg-blue-50 rounded-lg space-y-2 mb-3">
          <div className="flex gap-2">
            <input
              placeholder="圖示"
              value={form.icon}
              onChange={e => setForm({...form, icon: e.target.value})}
              className="w-16 p-2 border border-gray-200 rounded text-sm text-center"
              maxLength={2}
            />
            <input
              placeholder="類別名稱"
              value={form.name}
              onChange={e => setForm({...form, name: e.target.value})}
              className="flex-1 p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div>
            <div className="text-xs text-gray-500 mb-1">顏色</div>
            <div className="grid grid-cols-6 gap-1">
              {CATEGORY_COLORS.map(co => (
                <button
                  key={co.value}
                  onClick={() => setForm({...form, color: co.value})}
                  className={`py-1 px-1 rounded text-[11px] ${co.value} ${form.color === co.value ? "ring-2 ring-offset-1 ring-blue-400" : ""}`}
                >{co.label}</button>
              ))}
            </div>
          </div>
          <div className={`p-2 rounded ${form.color} text-center text-sm`}>
            預覽:{form.icon} {form.name || "類別名稱"}
          </div>
          <button onClick={handleSave} className="w-full py-2 bg-blue-500 text-white rounded text-sm">
            {editingName ? "更新" : "新增"}
          </button>
        </div>
      )}

      <div className="text-xs text-gray-500 mb-2">內建類別(可隱藏)</div>
      <div className="flex flex-wrap gap-1.5 mb-3">
        {builtins.map(name => {
          const c = CATEGORY_TREE[name];
          const isHidden = hidden.includes(name);
          return (
            <button
              key={name}
              onClick={() => ctx.toggleHiddenMainCategory(name)}
              className={`px-2 py-1 rounded-full text-xs ${c.color} ${isHidden ? "opacity-40 line-through" : ""}`}
            >
              {c.icon} {name}
            </button>
          );
        })}
      </div>

      <div className="text-xs text-gray-500 mb-2">自訂類別</div>
      {customs.length === 0 ? (
        <div className="text-xs text-gray-400 py-2">還沒有自訂類別</div>
      ) : (
        <div className="space-y-2">
          {customs.map(c => {
            const cur = subInput[c.name] || "";
            return (
              <div key={c.name} className={`rounded-lg p-2 ${c.color}`}>
                <div className="flex items-center justify-between">
                  <span className="font-medium">{c.icon} {c.name}</span>
                  <div className="flex gap-1">
                    <button onClick={() => startEdit(c)} className="text-xs bg-white/60 px-2 rounded">編輯</button>
                    <button
                      onClick={() => confirm(`刪除類別「${c.name}」?(已使用過的交易紀錄會保留)`) && ctx.removeCustomCategory(c.name)}
                      className="text-xs bg-white/60 text-red-500 px-2 rounded"
                    >刪除</button>
                  </div>
                </div>
                <div className="mt-2 flex flex-wrap gap-1 items-center">
                  {(c.sub || []).map(s => (
                    <span key={s} className="bg-white/70 text-gray-700 rounded-full px-2 py-0.5 text-[11px] inline-flex items-center gap-1">
                      {s}
                      <button
                        onClick={() => {
                          const next = (c.sub || []).filter(x => x !== s);
                          ctx.updateCustomCategory(c.name, { sub: next });
                        }}
                        className="text-red-400"
                      >×</button>
                    </span>
                  ))}
                  <input
                    placeholder="+ 新增子類別"
                    value={cur}
                    onChange={e => setSubInput({...subInput, [c.name]: e.target.value})}
                    onKeyDown={e => {
                      if (e.key === "Enter" && cur.trim()) {
                        ctx.updateCustomCategory(c.name, {
                          sub: [...(c.sub || []), cur.trim()]
                        });
                        setSubInput({...subInput, [c.name]: ""});
                      }
                    }}
                    className="text-[11px] bg-white/70 rounded-full px-2 py-0.5 w-24"
                  />
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ===================== 固定支出管理 =====================
function FixedExpensesManager({ ctx }) {
  const [adding, setAdding] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ name: "", amount: "", matchType: "category", matchValue: "飲食", endMonth: "", autoDeduct: false });

  const today = new Date();
  const currentYm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;

  const reset = () => {
    setForm({ name: "", amount: "", matchType: "category", matchValue: "飲食", endMonth: "", autoDeduct: false });
    setAdding(false);
    setEditingId(null);
  };

  const save = () => {
    if (!form.name || !form.amount) { alert("請填名稱與金額"); return; }
    const data = {
      name: form.name,
      amount: parseFloat(form.amount) || 0,
      matchType: form.matchType,
      matchValue: form.matchValue,
      endMonth: form.endMonth || "",
      autoDeduct: !!form.autoDeduct
    };
    if (editingId) ctx.updateFixedExpense(editingId, data);
    else ctx.addFixedExpense(data);
    reset();
  };

  const startEdit = (f) => {
    setForm({
      name: f.name, amount: f.amount,
      matchType: f.matchType || "accountType",
      matchValue: f.matchValue || "信用卡",
      endMonth: f.endMonth || "",
      autoDeduct: !!f.autoDeduct
    });
    setEditingId(f.id);
    setAdding(true);
  };

  const matchOptions = {
    // 信用卡不在此選:月結上方已自動顯示本月刷卡總額 + 分期拆分
    accountType: [...ACCOUNT_TYPES].filter(t => t !== "信用卡"),
    category: Object.keys(getCT()).filter(c => c !== "收入"),
    // 特定帳戶也隱藏信用卡帳戶(同上原因)
    account: ctx.state.accounts.filter(a => a.type !== "信用卡").map(a => a.name)
  };

  return (
    <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
      <div className="flex justify-between items-center mb-3">
        <h3 className="font-semibold">固定支出管理</h3>
        <button
          onClick={() => adding ? reset() : setAdding(true)}
          className="text-sm text-blue-500"
        >{adding ? "取消" : "+ 新增"}</button>
      </div>

      {adding && (
        <div className="p-3 bg-blue-50 rounded-lg space-y-2 mb-3">
          <input
            placeholder="名稱 (例:房租、信用卡)"
            value={form.name}
            onChange={e => setForm({...form, name: e.target.value})}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
          <input
            type="number"
            placeholder="每月金額"
            value={form.amount}
            onChange={e => setForm({...form, amount: e.target.value})}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />

          <label className="flex items-start gap-2 p-2 bg-purple-50 rounded cursor-pointer">
            <input
              type="checkbox"
              checked={form.autoDeduct}
              onChange={e => setForm({...form, autoDeduct: e.target.checked})}
              className="w-4 h-4 mt-0.5"
            />
            <div className="flex-1">
              <div className="text-sm font-medium">自動每月扣款(不需記帳)</div>
              <div className="text-[11px] text-gray-500">
                勾選後:每個月自動當作已扣掉。適合金額固定的房貸、信貸、電信等。
              </div>
            </div>
          </label>

          {!form.autoDeduct && (
            <>
              <div>
                <div className="text-xs text-gray-500 mb-1">比對方式(用哪種交易算「實際支出」?)</div>
                <select
                  value={form.matchType}
                  onChange={e => setForm({...form, matchType: e.target.value, matchValue: matchOptions[e.target.value][0]})}
                  className="w-full p-2 border border-gray-200 rounded text-sm bg-white"
                >
                  <option value="accountType">帳戶類型(例:金融卡、現金)</option>
                  <option value="category">類別(例:家用)</option>
                  <option value="account">特定帳戶(例:郵局存摺、現金)</option>
                </select>
              </div>
              <select
                value={form.matchValue}
                onChange={e => setForm({...form, matchValue: e.target.value})}
                className="w-full p-2 border border-gray-200 rounded text-sm bg-white"
              >
                {matchOptions[form.matchType].map(v => <option key={v}>{v}</option>)}
              </select>
              <div className="text-[11px] text-gray-500 bg-amber-50 p-2 rounded">
                💡 信用卡已自動處理(月結上方會顯示本月刷卡總額 + 分期拆分),不用在這裡設定。此處用來設定房租、保險、特定類別預算等固定開銷。
              </div>
            </>
          )}
          <div>
            <div className="text-xs text-gray-500 mb-1">固定到哪個月結束?(留空=永久)</div>
            <input
              type="month"
              value={form.endMonth}
              onChange={e => setForm({...form, endMonth: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <button onClick={save} className="w-full py-2 bg-blue-500 text-white rounded text-sm">
            {editingId ? "更新" : "新增"}
          </button>
        </div>
      )}

      {(ctx.state.fixedExpenses || []).length === 0 ? (
        <div className="text-center text-gray-400 py-4 text-sm">還沒有固定支出</div>
      ) : (
        <div className="space-y-2">
          {(ctx.state.fixedExpenses || []).map(f => {
            const expired = f.endMonth && f.endMonth < currentYm;
            return (
              <div key={f.id} className={`p-2 rounded flex justify-between items-start ${expired ? "bg-gray-100 opacity-60" : "bg-gray-50"}`}>
                <div className="flex-1 min-w-0">
                  <div className="font-medium text-sm">
                    {f.name} <span className="text-gray-400">{fmtMoney(f.amount)}</span>
                    {f.autoDeduct && <span className="ml-1 text-[10px] bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded">自動扣款</span>}
                    {expired && <span className="ml-1 text-[10px] text-gray-400">(已過期)</span>}
                  </div>
                  <div className="text-xs text-gray-500">
                    {f.autoDeduct
                      ? "每月自動扣款,不需記帳"
                      : `比對:${f.matchType === "accountType" ? "帳戶類型" : f.matchType === "category" ? "類別" : "特定帳戶"} = ${f.matchValue}`}
                    {f.endMonth && ` · 到 ${f.endMonth}`}
                  </div>
                </div>
                <div className="flex gap-1">
                  <button onClick={() => startEdit(f)} className="text-xs text-blue-500 px-1">編輯</button>
                  <button
                    onClick={() => confirm(`刪除「${f.name}」?`) && ctx.removeFixedExpense(f.id)}
                    className="text-xs text-red-400 px-1"
                  >刪除</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const LEDGER_TYPE_META = {

  utility: { label: "水電帳本", icon: "💡", desc: "每月水/電紀錄 + 同期比較分析" },
  subsidy: { label: "通用紀錄", icon: "📝", desc: "每月一筆的紀錄(例:補助、獎金、房租、零用)" }
};

function LedgerCard({ ctx, ledger, onOpen }) {
  const entries = (ctx.state.ledgerEntries || []).filter(e => e.ledgerId === ledger.id);
  let summary = "";
  if (ledger.type === "general") {
    const income = entries.filter(e => e.type === "收入").reduce((s, e) => s + (e.amount || 0), 0);
    const expense = entries.filter(e => e.type === "支出").reduce((s, e) => s + (e.amount || 0), 0);
    summary = `收入 ${fmtMoney(income)} · 支出 ${fmtMoney(expense)} · 結餘 ${fmtMoney(income - expense)}`;
  } else if (ledger.type === "utility") {
    const total = entries.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    summary = `${entries.length} 筆 · 總計 ${fmtMoney(total)}`;
  } else if (ledger.type === "subsidy") {
    const total = entries.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    summary = `${entries.length} 筆 · 累計 ${fmtMoney(total)}`;
  }

  return (
    <div className={`rounded-lg p-3 flex items-center justify-between ${ledger.color || "bg-gray-100"} ${ledger.archived ? "opacity-60" : ""}`}>
      <button onClick={onOpen} className="flex-1 text-left">
        <div className="font-semibold">
          {ledger.icon || "📒"} {ledger.name}
          <span className="ml-1 text-[10px] bg-white/70 px-1.5 py-0.5 rounded">
            {LEDGER_TYPE_META[ledger.type]?.label || ledger.type}
          </span>
        </div>
        <div className="text-xs text-gray-700 mt-0.5">{summary || "尚無紀錄"}</div>
      </button>
      <div className="flex gap-1 text-xs">
        {!ledger.archived ? (
          <button
            onClick={(e) => { e.stopPropagation(); ctx.archiveLedger(ledger.id, true); }}
            className="bg-white/70 px-2 py-1 rounded"
          >歸檔</button>
        ) : (
          <button
            onClick={(e) => { e.stopPropagation(); ctx.archiveLedger(ledger.id, false); }}
            className="bg-white/70 px-2 py-1 rounded"
          >還原</button>
        )}
        <button
          onClick={(e) => {
            e.stopPropagation();
            if (confirm(`刪除帳本「${ledger.name}」及其所有紀錄?此動作無法復原`)) {
              ctx.removeLedger(ledger.id);
            }
          }}
          className="bg-white/70 text-red-500 px-2 py-1 rounded"
        >刪除</button>
      </div>
    </div>
  );
}

// ===== 收支帳本(買菜等) =====
function GeneralLedger({ ctx, ledger }) {
  const entries = (ctx.state.ledgerEntries || [])
    .filter(e => e.ledgerId === ledger.id)
    .sort((a, b) => b.date.localeCompare(a.date));

  const [form, setForm] = useState({ type: "支出", amount: "", date: todayStr(), note: "" });

  const submit = () => {
    const amt = parseFloat(form.amount);
    if (!amt) { alert("請輸入金額"); return; }
    ctx.addLedgerEntry({
      ledgerId: ledger.id,
      type: form.type,
      amount: amt,
      date: form.date || todayStr(),
      note: form.note || ""
    });
    setForm({ type: form.type, amount: "", date: todayStr(), note: "" });
  };

  const income = entries.filter(e => e.type === "收入").reduce((s, e) => s + e.amount, 0);
  const expense = entries.filter(e => e.type === "支出").reduce((s, e) => s + e.amount, 0);

  // 依月份分組
  const byMonth = {};
  entries.forEach(e => {
    const ym = e.date.slice(0, 7);
    if (!byMonth[ym]) byMonth[ym] = { income: 0, expense: 0, items: [] };
    byMonth[ym].items.push(e);
    if (e.type === "收入") byMonth[ym].income += e.amount;
    else byMonth[ym].expense += e.amount;
  });

  return (
    <>
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-3">
        <h3 className="font-semibold mb-2">總覽</h3>
        <div className="grid grid-cols-3 gap-2">
          <div className="bg-green-50 rounded p-2 text-center">
            <div className="text-[11px] text-gray-500">總收入</div>
            <div className="font-bold text-green-600">{fmtMoney(income)}</div>
          </div>
          <div className="bg-red-50 rounded p-2 text-center">
            <div className="text-[11px] text-gray-500">總支出</div>
            <div className="font-bold text-red-500">{fmtMoney(expense)}</div>
          </div>
          <div className="bg-blue-50 rounded p-2 text-center">
            <div className="text-[11px] text-gray-500">結餘</div>
            <div className={`font-bold ${income - expense >= 0 ? "text-blue-600" : "text-red-500"}`}>
              {fmtMoney(income - expense)}
            </div>
          </div>
        </div>
      </div>

      <div className="bg-white rounded-2xl shadow-sm p-4 mb-3">
        <h3 className="font-semibold mb-2">新增紀錄</h3>
        <div className="flex gap-1 mb-2">
          <button
            onClick={() => setForm({...form, type: "支出"})}
            className={`flex-1 py-1.5 rounded text-sm ${form.type === "支出" ? "bg-red-500 text-white" : "bg-gray-100"}`}
          >支出</button>
          <button
            onClick={() => setForm({...form, type: "收入"})}
            className={`flex-1 py-1.5 rounded text-sm ${form.type === "收入" ? "bg-green-500 text-white" : "bg-gray-100"}`}
          >收入</button>
        </div>
        <div className="flex gap-2 mb-2">
          <input
            type="number"
            placeholder="金額"
            value={form.amount}
            onChange={e => setForm({...form, amount: e.target.value})}
            className="flex-1 p-2 border border-gray-200 rounded text-sm"
          />
          <input
            type="date"
            value={form.date}
            onChange={e => setForm({...form, date: e.target.value})}
            className="p-2 border border-gray-200 rounded text-xs"
          />
        </div>
        <input
          placeholder="備註(例:高麗菜、牛肉)"
          value={form.note}
          onChange={e => setForm({...form, note: e.target.value})}
          className="w-full p-2 border border-gray-200 rounded text-sm mb-2"
        />
        <button onClick={submit} className="w-full py-2 bg-blue-500 text-white rounded text-sm">
          新增
        </button>
      </div>

      {Object.keys(byMonth).sort().reverse().map(ym => (
        <div key={ym} className="bg-white rounded-2xl shadow-sm p-4 mb-3">
          <div className="flex justify-between items-center mb-2">
            <h3 className="font-semibold text-sm">{ym}</h3>
            <div className="text-xs">
              <span className="text-green-600">+{fmtMoney(byMonth[ym].income)}</span>
              <span className="text-gray-300 mx-1">|</span>
              <span className="text-red-500">-{fmtMoney(byMonth[ym].expense)}</span>
            </div>
          </div>
          <div className="space-y-1">
            {byMonth[ym].items.map(e => (
              <div key={e.id} className="flex items-center justify-between text-sm p-1.5 hover:bg-gray-50 rounded">
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-gray-500">{e.date}</div>
                  {e.note && <div className="truncate text-sm">{e.note}</div>}
                </div>
                <div className="flex items-center gap-2">
                  <span className={`font-semibold text-sm ${e.type === "支出" ? "text-red-500" : "text-green-500"}`}>
                    {e.type === "支出" ? "-" : "+"}{fmtMoney(e.amount)}
                  </span>
                  <button
                    onClick={() => confirm("刪除這筆?") && ctx.removeLedgerEntry(e.id)}
                    className="text-gray-400 text-xs"
                  >×</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </>
  );
}

// ===== 水/電帳本 =====
function UtilityLedger({ ctx, ledger }) {
  const entries = (ctx.state.ledgerEntries || [])
    .filter(e => e.ledgerId === ledger.id)
    .sort((a, b) => (b.year - a.year) || (b.month - a.month));

  const now = new Date();
  const [form, setForm] = useState({
    year: now.getFullYear(),
    month: now.getMonth() + 1,
    periodStart: "",
    periodEnd: "",
    usage: "",
    amount: "",
    persons: "",
    publicFee: "",
    unit: "度", // 度(電) / 度(水)
    note: ""
  });
  const [editingId, setEditingId] = useState(null);

  const submit = () => {
    if (!form.usage || !form.amount) { alert("請填使用量與金額"); return; }
    const data = {
      ledgerId: ledger.id,
      year: parseInt(form.year),
      month: parseInt(form.month),
      periodStart: form.periodStart,
      periodEnd: form.periodEnd,
      usage: parseFloat(form.usage),
      amount: parseFloat(form.amount),
      persons: parseFloat(form.persons) || 0,
      publicFee: parseFloat(form.publicFee) || 0,
      unit: form.unit,
      note: form.note,
      date: `${form.year}-${String(form.month).padStart(2,"0")}-01`
    };
    if (editingId) {
      ctx.updateLedgerEntry(editingId, data);
      setEditingId(null);
    } else {
      ctx.addLedgerEntry(data);
    }
    setForm({
      year: now.getFullYear(),
      month: now.getMonth() + 1,
      periodStart: "", periodEnd: "", usage: "", amount: "", persons: "",
      publicFee: "", unit: form.unit, note: ""
    });
  };

  const startEdit = (e) => {
    setForm({ ...e });
    setEditingId(e.id);
  };

  const cancelEdit = () => {
    setEditingId(null);
    setForm({
      year: now.getFullYear(),
      month: now.getMonth() + 1,
      periodStart: "", periodEnd: "", usage: "", amount: "", persons: "",
      publicFee: "", unit: form.unit, note: ""
    });
  };

  // 同期比較:本月 vs 去年同月
  const thisYear = now.getFullYear();
  const thisMonth = now.getMonth() + 1;
  const thisEntry = entries.find(e => e.year === thisYear && e.month === thisMonth);
  const lastYearEntry = entries.find(e => e.year === thisYear - 1 && e.month === thisMonth);
  const compareUsage = (thisEntry && lastYearEntry)
    ? thisEntry.usage - lastYearEntry.usage : null;
  const compareAmount = (thisEntry && lastYearEntry)
    ? thisEntry.amount - lastYearEntry.amount : null;

  // 平均(可用 persons 做)
  const avgAll = entries.length > 0
    ? entries.reduce((s, e) => s + e.amount, 0) / entries.length
    : 0;
  const totalUsage = entries.reduce((s, e) => s + e.usage, 0);
  const totalAmount = entries.reduce((s, e) => s + e.amount, 0);

  return (
    <>
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-3">
        <h3 className="font-semibold mb-2">總覽</h3>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div className="bg-blue-50 rounded p-2 text-center">
            <div className="text-[11px] text-gray-500">總使用量</div>
            <div className="font-bold text-blue-600">{totalUsage.toFixed(1)} {form.unit}</div>
          </div>
          <div className="bg-orange-50 rounded p-2 text-center">
            <div className="text-[11px] text-gray-500">總金額</div>
            <div className="font-bold text-orange-600">{fmtMoney(totalAmount)}</div>
          </div>
        </div>
        <div className="bg-gray-50 rounded p-2 text-center">
          <div className="text-[11px] text-gray-500">每期平均</div>
          <div className="font-bold">{fmtMoney(avgAll)}</div>
        </div>

        {(compareUsage !== null || compareAmount !== null) && (
          <div className="mt-2 bg-yellow-50 rounded p-2">
            <div className="text-[11px] text-gray-500 mb-1">
              同期比較 ({thisYear-1}/{thisMonth} → {thisYear}/{thisMonth})
            </div>
            {compareUsage !== null && (
              <div className="text-xs flex justify-between">
                <span>使用量:</span>
                <span className={compareUsage > 0 ? "text-red-500" : "text-green-600"}>
                  {compareUsage > 0 ? "+" : ""}{compareUsage.toFixed(1)} {form.unit}
                  {lastYearEntry.usage > 0 && ` (${(compareUsage/lastYearEntry.usage*100).toFixed(1)}%)`}
                </span>
              </div>
            )}
            {compareAmount !== null && (
              <div className="text-xs flex justify-between">
                <span>金額:</span>
                <span className={compareAmount > 0 ? "text-red-500" : "text-green-600"}>
                  {compareAmount > 0 ? "+" : ""}{fmtMoney(compareAmount)}
                  {lastYearEntry.amount > 0 && ` (${(compareAmount/lastYearEntry.amount*100).toFixed(1)}%)`}
                </span>
              </div>
            )}
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl shadow-sm p-4 mb-3">
        <h3 className="font-semibold mb-2">{editingId ? "編輯紀錄" : "新增紀錄"}</h3>
        <div className="grid grid-cols-3 gap-2 mb-2">
          <div>
            <div className="text-[11px] text-gray-500">年份</div>
            <input
              type="number"
              value={form.year}
              onChange={e => setForm({...form, year: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div>
            <div className="text-[11px] text-gray-500">月份</div>
            <input
              type="number"
              min="1" max="12"
              value={form.month}
              onChange={e => setForm({...form, month: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div>
            <div className="text-[11px] text-gray-500">單位</div>
            <select
              value={form.unit}
              onChange={e => setForm({...form, unit: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm bg-white"
            >
              <option>度</option>
              <option>m³</option>
              <option>kWh</option>
            </select>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div>
            <div className="text-[11px] text-gray-500">計費起</div>
            <input
              type="date"
              value={form.periodStart}
              onChange={e => setForm({...form, periodStart: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-xs"
            />
          </div>
          <div>
            <div className="text-[11px] text-gray-500">計費迄</div>
            <input
              type="date"
              value={form.periodEnd}
              onChange={e => setForm({...form, periodEnd: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-xs"
            />
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div>
            <div className="text-[11px] text-gray-500">使用量 ({form.unit})</div>
            <input
              type="number"
              value={form.usage}
              onChange={e => setForm({...form, usage: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div>
            <div className="text-[11px] text-gray-500">總金額</div>
            <input
              type="number"
              value={form.amount}
              onChange={e => setForm({...form, amount: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div>
            <div className="text-[11px] text-gray-500">使用人數</div>
            <input
              type="number"
              value={form.persons}
              onChange={e => setForm({...form, persons: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
          <div>
            <div className="text-[11px] text-gray-500">公設費(選)</div>
            <input
              type="number"
              value={form.publicFee}
              onChange={e => setForm({...form, publicFee: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
        </div>
        <input
          placeholder="備註"
          value={form.note}
          onChange={e => setForm({...form, note: e.target.value})}
          className="w-full p-2 border border-gray-200 rounded text-sm mb-2"
        />
        {form.usage > 0 && form.amount > 0 && (
          <div className="text-[11px] text-gray-600 bg-gray-50 p-2 rounded mb-2">
            每{form.unit}: {fmtMoney(form.amount / form.usage)} /
            {form.persons > 0 ? ` 人均: ${fmtMoney(form.amount / form.persons)}` : " 請填使用人數看人均"}
          </div>
        )}
        <div className="flex gap-2">
          <button onClick={submit} className="flex-1 py-2 bg-blue-500 text-white rounded text-sm">
            {editingId ? "更新" : "新增"}
          </button>
          {editingId && (
            <button onClick={cancelEdit} className="px-3 py-2 bg-gray-200 rounded text-sm">取消</button>
          )}
        </div>
      </div>

      <div className="bg-white rounded-2xl shadow-sm p-4">
        <h3 className="font-semibold mb-2">歷史紀錄</h3>
        {entries.length === 0 ? (
          <div className="text-center text-gray-400 py-4 text-sm">還沒有紀錄</div>
        ) : (
          <div className="space-y-2">
            {entries.map(e => {
              const perUnit = e.usage > 0 ? e.amount / e.usage : 0;
              const perPerson = e.persons > 0 ? e.amount / e.persons : 0;
              // 同期比較:去年同月
              const prev = entries.find(x => x.year === e.year - 1 && x.month === e.month);
              const usageDiff = prev ? e.usage - prev.usage : null;
              const amountDiff = prev ? e.amount - prev.amount : null;
              const usagePct = (prev && prev.usage > 0) ? (usageDiff / prev.usage * 100) : null;
              const amountPct = (prev && prev.amount > 0) ? (amountDiff / prev.amount * 100) : null;
              return (
                <div key={e.id} className="p-2 bg-gray-50 rounded text-sm">
                  <div className="flex justify-between items-start">
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold">{e.year}/{e.month}月</div>
                      <div className="text-xs text-gray-500">
                        {e.periodStart && `${e.periodStart} ~ ${e.periodEnd}`}
                      </div>
                      <div className="text-xs mt-1">
                        用量 {e.usage}{e.unit || "度"} · {fmtMoney(e.amount)}
                      </div>
                      <div className="text-[10px] text-gray-500">
                        每{e.unit || "度"} {fmtMoney(perUnit)}
                        {e.persons > 0 && ` · ${e.persons}人 人均${fmtMoney(perPerson)}`}
                        {e.publicFee > 0 && ` · 公設${fmtMoney(e.publicFee)}`}
                      </div>
                      {prev && (
                        <div className="text-[10px] mt-1 bg-white rounded px-1.5 py-1 border border-gray-100">
                          <span className="text-gray-400">vs {prev.year}/{prev.month}:</span>
                          <span className={`ml-1 font-medium ${usageDiff > 0 ? "text-red-500" : usageDiff < 0 ? "text-green-600" : "text-gray-500"}`}>
                            用量 {usageDiff > 0 ? "+" : ""}{usageDiff.toFixed(1)}{e.unit || "度"}
                            {usagePct !== null && ` (${usagePct > 0 ? "+" : ""}${usagePct.toFixed(1)}%)`}
                          </span>
                          <span className={`ml-2 font-medium ${amountDiff > 0 ? "text-red-500" : amountDiff < 0 ? "text-green-600" : "text-gray-500"}`}>
                            金額 {amountDiff > 0 ? "+" : ""}{fmtMoney(amountDiff)}
                            {amountPct !== null && ` (${amountPct > 0 ? "+" : ""}${amountPct.toFixed(1)}%)`}
                          </span>
                        </div>
                      )}
                      {e.note && <div className="text-xs text-gray-400 mt-0.5">{e.note}</div>}
                    </div>
                    <div className="flex gap-1 text-xs">
                      <button onClick={() => startEdit(e)} className="text-blue-500">編輯</button>
                      <button
                        onClick={() => confirm("刪除這筆?") && ctx.removeLedgerEntry(e.id)}
                        className="text-red-400"
                      >刪除</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}

// ===== 通用紀錄帳本(每月一筆) =====
function SubsidyLedger({ ctx, ledger }) {
  const entries = (ctx.state.ledgerEntries || [])
    .filter(e => e.ledgerId === ledger.id)
    .sort((a, b) => b.ym.localeCompare(a.ym));

  const [form, setForm] = useState({
    ym: new Date().toISOString().slice(0, 7),
    date: todayStr(),
    amount: "",
    note: ""
  });

  const submit = () => {
    if (!form.amount) { alert("請輸入金額"); return; }
    ctx.addLedgerEntry({
      ledgerId: ledger.id,
      ym: form.ym,
      date: form.date,
      amount: parseFloat(form.amount),
      note: form.note
    });

      ym: new Date().toISOString().slice(0, 7),
      date: todayStr(),
      amount: "",
      note: ""

    <>

            <div className="text-[11px] text-gray-500">每月平均</div>
            <div className="font-bold text-blue-600">{fmtMoney(avg)}</div>

            <div className="text-[11px] text-gray-500">日期</div>
            <input
              type="date"
              value={form.date}
              onChange={e => setForm({...form, date: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded text-sm"
            />
          </div>
        </div>
        <div className="mb-2">
          <div className="text-[11px] text-gray-500">金額</div>
          <input
            type="number"
            value={form.amount}
            onChange={e => setForm({...form, amount: e.target.value})}
            className="w-full p-2 border border-gray-200 rounded text-sm"
          />
        </div>
        <input
          placeholder="備註(選填)"

          onChange={e => setForm({...form, note: e.target.value})}
          className="w-full p-2 border border-gray-200 rounded text-sm mb-2"
        />
        <button onClick={submit} className="w-full py-2 bg-blue-500 text-white rounded text-sm">新增</button>
      </div>

      <div className="bg-white rounded-2xl shadow-sm p-4">
        <h3 className="font-semibold mb-2">紀錄 ({entries.length})</h3>
        {entries.length === 0 ? (
          <div className="text-center text-gray-400 py-4 text-sm">還沒有紀錄</div>
        ) : (
          <div className="space-y-1">
            {entries.map(e => (
              <div key={e.id} className="flex items-center justify-between p-2 bg-gray-50 rounded text-sm">
                <div>
                  <div className="font-semibold">{e.ym}</div>

// ===================== 帳戶餘額提示(選單下方顯示) =====================
function AccountBalanceHint({ ctx, accountName }) {
  if (!accountName) return null;
  const acc = ctx.state.accounts.find(a => a.name === accountName);
  if (!acc) return null;
  const bal = ctx.getAccountBalance(acc);
  let label = "", value = "", cls = "text-gray-600";
  if (bal.type === "credit") {
    label = "剩餘額度";
    value = fmtMoney(bal.remaining);
    cls = bal.remaining < 0 ? "text-red-500 font-semibold" : "text-green-600 font-semibold";
  } else if (bal.type === "loan") {
    label = "貸款剩餘";
    value = fmtMoney(bal.remaining);
    cls = "text-orange-500 font-semibold";
  } else {
    label = "目前餘額";
    value = fmtMoney(bal.balance);
    cls = bal.balance < 0 ? "text-red-500 font-semibold" : "text-blue-600 font-semibold";
  }
  return (
    <div className="mt-1 text-[11px] text-gray-500 flex justify-between">
      <span>{ACCOUNT_TYPE_ICON[acc.type]} {label}</span>
      <span className={cls}>{value}</span>
    </div>
  );
}
