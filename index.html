// ===================== 記帳頁 =====================
function AddTab({ ctx }) {
  const [type, setType] = useState("支出");
  const [amount, setAmount] = useState("");
  const [category, setCategory] = useState("飲食");
  const [subcategory, setSubcategory] = useState("");
  const [date, setDate] = useState(todayStr());
  const [account, setAccount] = useState(ctx.state.accounts[0]?.name || "");
  const [note, setNote] = useState("");
  const [isInstallment, setIsInstallment] = useState(false);
  const [periods, setPeriods] = useState(12);
  const [installmentFee, setInstallmentFee] = useState("");
  const [installmentRate, setInstallmentRate] = useState("");
  const [editingTx, setEditingTx] = useState(null);
  // 轉帳
  const [fromAccount, setFromAccount] = useState(ctx.state.accounts[0]?.name || "");
  const [toAccount, setToAccount] = useState(ctx.state.accounts[1]?.name || "");

  // 薪資模式(收入)
  const [salaryMode, setSalaryMode] = useState(false);
  const [salaryGross, setSalaryGross] = useState("");
  const [salaryHealthIns, setSalaryHealthIns] = useState("");
  const [salaryLaborIns, setSalaryLaborIns] = useState("");
  const [salaryOther, setSalaryOther] = useState("");

  // 新增/刪除子分類
  const [showAddSub, setShowAddSub] = useState(false);
  const [newSub, setNewSub] = useState("");
  const [manageSub, setManageSub] = useState(false);

  // 新增/刪除主類別
  const [showAddCat, setShowAddCat] = useState(false);
  const [manageCat, setManageCat] = useState(false);
  const [newCatForm, setNewCatForm] = useState({ name: "", icon: "📌", color: "bg-gray-100 text-gray-700" });

  const categories = Object.keys(getCT()).filter(c =>
    type === "收入" ? c === "收入" : c !== "收入"
  );

  useEffect(() => {
    if (type === "收入" && category !== "收入") setCategory("收入");
    if (type === "支出" && category === "收入") setCategory("飲食");
  }, [type]);

  const salaryNet = useMemo(() => {
    const g = parseFloat(salaryGross) || 0;
    const h = parseFloat(salaryHealthIns) || 0;
    const l = parseFloat(salaryLaborIns) || 0;
    const o = parseFloat(salaryOther) || 0;
    return g - h - l - o;
  }, [salaryGross, salaryHealthIns, salaryLaborIns, salaryOther]);

  const handleSubmit = () => {
    if (type === "轉帳") {
      const amt = parseFloat(amount);
      if (!amt || amt <= 0) { alert("請輸入金額"); return; }
      if (!fromAccount || !toAccount) { alert("請選擇帳戶"); return; }
      if (fromAccount === toAccount) { alert("轉出與轉入帳戶不能相同"); return; }
      ctx.addTransfer({ date, amount: amt, fromAccount, toAccount, note });
      setAmount(""); setNote("");
      alert(`已轉帳 ${fmtMoney(amt)}`);
      return;
    }
    if (salaryMode && type === "收入") {
      if (salaryNet <= 0) { alert("請輸入薪資資訊"); return; }
      const salaryNote = `薪資:總${salaryGross || 0}-健保${salaryHealthIns || 0}-勞保${salaryLaborIns || 0}${salaryOther ? `-其他${salaryOther}` : ""}${note ? " | " + note : ""}`;
      ctx.addTransaction({
        type: "收入", date, category: "收入", subcategory: "薪資",
        amount: salaryNet, account, note: salaryNote
      }, 1);
      setSalaryGross(""); setSalaryHealthIns(""); setSalaryLaborIns(""); setSalaryOther("");
      setNote("");
      alert(`已新增薪資 ${fmtMoney(salaryNet)}(扣完實領)`);
      return;
    }
    const amt = parseFloat(amount);
    if (!amt || amt <= 0) { alert("請輸入金額"); return; }
    ctx.addTransaction({
      type, date, category, subcategory, amount: amt, account, note
    }, isInstallment ? parseInt(periods) : 1, {
      fee: installmentFee,
      rate: installmentRate
    });
    setAmount("");
    setNote("");
    setIsInstallment(false);
    setInstallmentFee("");
    setInstallmentRate("");
    alert(isInstallment ? `已新增 ${periods} 期分期` : "記帳成功!");
  };

  // 合併內建 + 自訂子類別,扣除已隱藏的內建
  const getSubcategories = (mainCat) => {
    const builtin = getCT(mainCat)?.sub || [];
    const hidden = (ctx.state.hiddenSubcategories || {})[mainCat] || [];
    const custom = (ctx.state.customSubcategories || {})[mainCat] || [];
    return [...builtin.filter(s => !hidden.includes(s)), ...custom];
  };

  const recentTx = ctx.state.transactions.slice(-5).reverse();

  return (
    <div className="p-4 pb-4">
      <h1 className="text-2xl font-bold text-gray-800 mb-4">記帳</h1>

      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        {/* 類型切換 */}
        <div className="flex bg-gray-100 rounded-full p-1 mb-4">
          {["支出", "收入", "轉帳"].map(t => (
            <button
              key={t}
              onClick={() => setType(t)}
              className={`flex-1 py-2 rounded-full font-semibold text-sm transition ${
                type === t
                  ? (t === "支出" ? "bg-red-500 text-white" : t === "收入" ? "bg-green-500 text-white" : "bg-blue-500 text-white")
                  : "text-gray-500"
              }`}
            >{t}</button>
          ))}
        </div>

        {/* 薪資模式切換(只在收入時顯示) */}
        {type === "收入" && (
          <div className="mb-3">
            <label className="flex items-center gap-2 p-2 bg-green-50 rounded-lg">
              <input
                type="checkbox"
                checked={salaryMode}
                onChange={e => setSalaryMode(e.target.checked)}
                className="w-4 h-4"
              />
              <span className="text-sm font-medium">💼 薪資模式(輸入總額與扣款)</span>
            </label>
          </div>
        )}

        {/* 轉帳模式:from → to 選擇 */}
        {type === "轉帳" && (
          <div className="mb-3 bg-blue-50 rounded-xl p-3 space-y-2">
            <div className="text-xs text-gray-600">💸 轉帳:從 A 帳戶移動金額到 B 帳戶(不計入收支)</div>
            {ctx.state.accounts.length < 2 ? (
              <div className="w-full p-3 border border-dashed border-amber-300 bg-amber-50 rounded-lg text-xs text-amber-700 text-center leading-relaxed">
                ⚠️ 轉帳需要至少兩個帳戶<br/>
                請先到「設定 → 帳戶管理」建立帳戶。
              </div>
            ) : (
              <>
                <div>
                  <div className="text-xs text-gray-500 mb-1">轉出帳戶(扣款)</div>
                  <select
                    value={fromAccount}
                    onChange={e => setFromAccount(e.target.value)}
                    className="w-full p-2 border border-gray-200 rounded bg-white text-sm"
                  >
                    {ACCOUNT_TYPES.map(t => {
                      const accs = ctx.state.accounts.filter(a => a.type === t);
                      if (accs.length === 0) return null;
                      return (
                        <optgroup key={t} label={ACCOUNT_TYPE_ICON[t] + " " + ACCOUNT_TYPE_LABEL[t]}>
                          {accs.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                        </optgroup>
                      );
                    })}
                  </select>
                  <AccountBalanceHint ctx={ctx} accountName={fromAccount} />
                </div>
                <div className="text-center text-gray-400">↓</div>
                <div>
                  <div className="text-xs text-gray-500 mb-1">轉入帳戶(存款)</div>
                  <select
                    value={toAccount}
                    onChange={e => setToAccount(e.target.value)}
                    className="w-full p-2 border border-gray-200 rounded bg-white text-sm"
                  >
                    {ACCOUNT_TYPES.map(t => {
                      const accs = ctx.state.accounts.filter(a => a.type === t);
                      if (accs.length === 0) return null;
                      return (
                        <optgroup key={t} label={ACCOUNT_TYPE_ICON[t] + " " + ACCOUNT_TYPE_LABEL[t]}>
                          {accs.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                        </optgroup>
                      );
                    })}
                  </select>
                  <AccountBalanceHint ctx={ctx} accountName={toAccount} />
                </div>
              </>
            )}
          </div>
        )}

        {/* 金額 */}
        {!salaryMode ? (
          <div className="mb-4">
            <input
              type="number"
              inputMode="decimal"
              placeholder="0"
              value={amount}
              onChange={e => setAmount(e.target.value)}
              className="w-full text-4xl font-bold text-center py-4 border-b-2 border-gray-200 focus:border-blue-500 outline-none"
            />
          </div>
        ) : (
          <div className="mb-4 bg-green-50 rounded-xl p-3 space-y-2">
            <div className="flex items-center gap-2">
              <span className="text-sm text-gray-600 w-20">薪資總額</span>
              <input type="number" inputMode="decimal" placeholder="0"
                value={salaryGross} onChange={e => setSalaryGross(e.target.value)}
                className="flex-1 p-2 border border-gray-200 rounded text-right font-semibold"
              />
            </div>
            <div className="flex items-center gap-2">
              <span className="text-sm text-gray-600 w-20">- 健保</span>
              <input type="number" inputMode="decimal" placeholder="0"
                value={salaryHealthIns} onChange={e => setSalaryHealthIns(e.target.value)}
                className="flex-1 p-2 border border-gray-200 rounded text-right text-red-500"
              />
            </div>
            <div className="flex items-center gap-2">
              <span className="text-sm text-gray-600 w-20">- 勞保</span>
              <input type="number" inputMode="decimal" placeholder="0"
                value={salaryLaborIns} onChange={e => setSalaryLaborIns(e.target.value)}
                className="flex-1 p-2 border border-gray-200 rounded text-right text-red-500"
              />
            </div>
            <div className="flex items-center gap-2">
              <span className="text-sm text-gray-600 w-20">- 其他扣</span>
              <input type="number" inputMode="decimal" placeholder="0 (選填)"
                value={salaryOther} onChange={e => setSalaryOther(e.target.value)}
                className="flex-1 p-2 border border-gray-200 rounded text-right text-red-500"
              />
            </div>
            <div className="border-t-2 border-green-200 pt-2 flex items-center justify-between">
              <span className="text-sm font-semibold text-gray-700">實領金額</span>
              <span className="text-2xl font-bold text-green-600">{fmtMoney(salaryNet)}</span>
            </div>
          </div>
        )}

        {/* 類別 */}
        {type !== "轉帳" && (
        <div className="mb-3">
          <div className="flex items-center justify-between mb-2">
            <div className="text-sm text-gray-500">類別</div>
            {type === "支出" && (
              <div className="flex gap-2 text-xs">
                <button
                  onClick={() => { setManageCat(!manageCat); setShowAddCat(false); }}
                  className="text-gray-500"
                >{manageCat ? "完成" : "管理"}</button>
                <button
                  onClick={() => { setShowAddCat(!showAddCat); setManageCat(false); }}
                  className="text-blue-500"
                >{showAddCat ? "取消" : "+ 新增"}</button>
              </div>
            )}
          </div>
          <div className="grid grid-cols-4 gap-2">
            {categories.map(c => {
              const info = getCT(c);
              const isBuiltin = !!CATEGORY_TREE[c];
              const isCustom = !isBuiltin;
              return (
                <div key={c} className="relative">
                  <button
                    onClick={() => { setCategory(c); setSubcategory(""); }}
                    className={`w-full py-3 rounded-xl text-sm font-medium transition ${
                      category === c
                        ? "bg-blue-500 text-white shadow-sm"
                        : "bg-gray-100 text-gray-700"
                    }`}
                  >
                    <div className="text-xl">{info?.icon}</div>
                    <div className="text-xs mt-0.5">{c}</div>
                  </button>
                  {manageCat && (
                    <>
                      {isCustom && (
                        <button
                          onClick={() => {
                            if (confirm(`刪除自訂類別「${c}」?(已使用的交易保留)`)) {
                              ctx.removeCustomCategory(c);
                              if (category === c) setCategory("飲食");
                            }
                          }}
                          className="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center shadow"
                        >×</button>
                      )}
                      {isBuiltin && (
                        <button
                          onClick={() => {
                            ctx.toggleHiddenMainCategory(c);
                            if (category === c) setCategory("飲食");
                          }}
                          className="absolute -top-1 -right-1 w-5 h-5 bg-gray-500 text-white rounded-full text-[10px] flex items-center justify-center shadow"
                          title="隱藏內建類別"
                        >隱</button>
                      )}
                    </>
                  )}
                </div>
              );
            })}
          </div>

          {/* 管理模式下顯示被隱藏的內建類別(可還原) */}
          {manageCat && (ctx.state.hiddenMainCategories || []).length > 0 && (
            <div className="mt-2 p-2 bg-gray-50 rounded-lg">
              <div className="text-[11px] text-gray-500 mb-1">已隱藏(點一下還原)</div>
              <div className="flex flex-wrap gap-1">
                {(ctx.state.hiddenMainCategories || []).map(name => {
                  const info = CATEGORY_TREE[name];
                  return (
                    <button
                      key={name}
                      onClick={() => ctx.toggleHiddenMainCategory(name)}
                      className={`px-2 py-1 rounded-full text-xs ${info?.color || "bg-gray-100"} opacity-60`}
                    >{info?.icon} {name}</button>
                  );
                })}
              </div>
            </div>
          )}

          {/* 新增自訂類別表單 */}
          {showAddCat && (
            <div className="mt-2 p-3 bg-blue-50 rounded-lg space-y-2">
              <div className="flex gap-2">
                <input
                  placeholder="圖示"
                  value={newCatForm.icon}
                  onChange={e => setNewCatForm({...newCatForm, icon: e.target.value})}
                  className="w-14 p-2 border border-gray-200 rounded text-sm text-center"
                  maxLength={2}
                />
                <input
                  placeholder="新主類別名稱"
                  value={newCatForm.name}
                  onChange={e => setNewCatForm({...newCatForm, name: e.target.value})}
                  className="flex-1 p-2 border border-gray-200 rounded text-sm"
                />
              </div>
              <div>
                <div className="text-[11px] text-gray-500 mb-1">顏色</div>
                <div className="grid grid-cols-6 gap-1">
                  {CATEGORY_COLORS.map(co => (
                    <button
                      key={co.value}
                      onClick={() => setNewCatForm({...newCatForm, color: co.value})}
                      className={`py-1 px-1 rounded text-[11px] ${co.value} ${newCatForm.color === co.value ? "ring-2 ring-offset-1 ring-blue-400" : ""}`}
                    >{co.label}</button>
                  ))}
                </div>
              </div>
              <div className={`p-2 rounded text-center text-sm ${newCatForm.color}`}>
                預覽:{newCatForm.icon} {newCatForm.name || "類別名稱"}
              </div>
              <button
                onClick={() => {
                  if (!newCatForm.name.trim()) { alert("請輸入名稱"); return; }
                  ctx.addCustomCategory({
                    name: newCatForm.name.trim(),
                    icon: newCatForm.icon,
                    color: newCatForm.color,
                    sub: []
                  });
                  setNewCatForm({ name: "", icon: "📌", color: "bg-gray-100 text-gray-700" });
                  setShowAddCat(false);
                }}
                className="w-full py-2 bg-blue-500 text-white rounded text-sm"
              >新增類別</button>
            </div>
          )}
        </div>
        )}

        {/* 子類別(可自訂新增/刪除) */}
        {!salaryMode && type !== "轉帳" && (
          <div className="mb-3">
            <div className="flex items-center justify-between mb-2">
              <div className="text-sm text-gray-500">子分類(選填)</div>
              <div className="flex gap-2 text-xs">
                <button
                  onClick={() => setManageSub(!manageSub)}
                  className="text-gray-500"
                >{manageSub ? "完成" : "管理"}</button>
                <button
                  onClick={() => setShowAddSub(!showAddSub)}
                  className="text-blue-500"
                >{showAddSub ? "取消" : "+ 新增"}</button>
              </div>
            </div>
            <div className="flex flex-wrap gap-2">
              {getSubcategories(category).map(s => (
                <div key={s} className="relative">
                  <button
                    onClick={() => setSubcategory(s === subcategory ? "" : s)}
                    className={`px-3 py-1.5 rounded-full text-sm transition ${
                      subcategory === s
                        ? "bg-blue-500 text-white"
                        : "bg-gray-100 text-gray-700"
                    }`}
                  >{s}</button>
                  {manageSub && (
                    <button
                      onClick={() => {
                        if (confirm(`刪除子分類「${s}」?`)) {
                          ctx.removeSubcategory(category, s);
                          if (subcategory === s) setSubcategory("");
                        }
                      }}
                      className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center"
                    >×</button>
                  )}
                </div>
              ))}
            </div>
            {showAddSub && (
              <div className="mt-2 flex gap-2">
                <input
                  placeholder={`新增「${category}」的子分類`}
                  value={newSub}
                  onChange={e => setNewSub(e.target.value)}
                  className="flex-1 p-2 border border-gray-200 rounded text-sm"
                />
                <button
                  onClick={() => { ctx.addSubcategory(category, newSub); setNewSub(""); setShowAddSub(false); }}
                  className="px-3 bg-blue-500 text-white rounded text-sm"
                >新增</button>
              </div>
            )}
          </div>
        )}

        {/* 日期、帳戶 */}
        <div className={`grid ${type === "轉帳" ? "grid-cols-1" : "grid-cols-2"} gap-3 mb-3`}>
          <div>
            <div className="text-sm text-gray-500 mb-1">日期</div>
            <input
              type="date"
              value={date}
              onChange={e => setDate(e.target.value)}
              className="w-full p-2.5 border border-gray-200 rounded-lg"
            />
          </div>
          {type !== "轉帳" && (
          <div>
            <div className="text-sm text-gray-500 mb-1">{type === "支出" ? "付款帳戶" : "入帳帳戶"}</div>
            {ctx.state.accounts.length === 0 ? (
              <div className="w-full p-3 border border-dashed border-amber-300 bg-amber-50 rounded-lg text-xs text-amber-700 text-center leading-relaxed">
                ⚠️ 還沒有任何帳戶<br/>
                請先到「設定 → 帳戶管理」建立帳戶(例如:現金、某某銀行、信用卡),才能開始記帳。
              </div>
            ) : (
              <>
                <select
                  value={account}
                  onChange={e => setAccount(e.target.value)}
                  className="w-full p-2.5 border border-gray-200 rounded-lg bg-white"
                >
                  {ACCOUNT_TYPES.map(t => {
                    const accs = ctx.state.accounts.filter(a => a.type === t);
                    if (accs.length === 0) return null;
                    return (
                      <optgroup key={t} label={ACCOUNT_TYPE_ICON[t] + " " + ACCOUNT_TYPE_LABEL[t]}>
                        {accs.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                      </optgroup>
                    );
                  })}
                </select>
                <AccountBalanceHint ctx={ctx} accountName={account} />
              </>
            )}
          </div>
          )}
        </div>

        {/* 備註 */}
        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1">備註(明細)</div>
          <input
            type="text"
            placeholder="例:LG吸塵器、麥當勞早餐..."
            value={note}
            onChange={e => setNote(e.target.value)}
            className="w-full p-2.5 border border-gray-200 rounded-lg"
          />
        </div>

        {/* 分期 */}
        {type === "支出" && (
          <div className="mb-3 bg-yellow-50 rounded-lg p-3">
            <label className="flex items-center gap-2 mb-2">
              <input
                type="checkbox"
                checked={isInstallment}
                onChange={e => setIsInstallment(e.target.checked)}
                className="w-4 h-4"
              />
              <span className="text-sm font-medium">分期付款(自動展開到未來月份)</span>
            </label>
            {isInstallment && (
              <div className="space-y-2">
                <div className="flex items-center gap-2">
                  <span className="text-sm text-gray-600">分</span>
                  <input
                    type="number"
                    min="2"
                    max="36"
                    value={periods}
                    onChange={e => setPeriods(e.target.value)}
                    className="w-20 p-1.5 border border-gray-200 rounded text-center"
                  />
                  <span className="text-sm text-gray-600">期</span>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <div className="text-[11px] text-gray-500 mb-0.5">手續費(選填,元)</div>
                    <input
                      type="number"
                      placeholder="0"
                      value={installmentFee}
                      onChange={e => setInstallmentFee(e.target.value)}
                      className="w-full p-1.5 border border-gray-200 rounded text-sm"
                    />
                  </div>
                  <div>
                    <div className="text-[11px] text-gray-500 mb-0.5">年利率(選填,%)</div>
                    <input
                      type="number"
                      step="0.01"
                      placeholder="0"
                      value={installmentRate}
                      onChange={e => setInstallmentRate(e.target.value)}
                      className="w-full p-1.5 border border-gray-200 rounded text-sm"
                    />
                  </div>
                </div>
                {(() => {
                  const principal = parseFloat(amount) || 0;
                  const fee = parseFloat(installmentFee) || 0;
                  const rate = parseFloat(installmentRate) || 0;
                  const n = parseInt(periods) || 1;
                  const estInterest = rate > 0 ? Math.round(principal * (rate / 100) * (n / 12)) : 0;
                  const total = principal + fee + estInterest;
                  const per = n > 0 ? Math.round(total / n) : 0;
                  return (
                    <div className="bg-white rounded p-2 text-xs space-y-0.5">
                      <div className="flex justify-between"><span className="text-gray-500">本金</span><span>{fmtMoney(principal)}</span></div>
                      {fee > 0 && <div className="flex justify-between"><span className="text-gray-500">+ 手續費</span><span>{fmtMoney(fee)}</span></div>}
                      {estInterest > 0 && <div className="flex justify-between"><span className="text-gray-500">+ 估利息({rate}%)</span><span>{fmtMoney(estInterest)}</span></div>}
                      <div className="flex justify-between font-semibold border-t pt-0.5"><span>總額</span><span className="text-red-500">{fmtMoney(total)}</span></div>
                      <div className="flex justify-between text-[11px] text-gray-500"><span>每期</span><span className="font-semibold text-red-500">{fmtMoney(per)} × {n}</span></div>
                    </div>
                  );
                })()}
              </div>
            )}
          </div>
        )}

        <button
          onClick={handleSubmit}
          className="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition"
        >儲存</button>
      </div>

      {/* 最近紀錄 */}
      <div className="bg-white rounded-2xl shadow-sm p-4">
        <h3 className="font-semibold text-gray-700 mb-3">最近紀錄</h3>
        {recentTx.length === 0 ? (
          <div className="text-center text-gray-400 py-6 text-sm">還沒有紀錄,開始記帳吧!</div>
        ) : (
          <div className="space-y-1">
            {recentTx.map(t => (
              <TxRow
                key={t.id}
                t={t}
                onEdit={() => setEditingTx(t)}
                onDelete={() => {
                  if (t.installmentGroupId && confirm("這是分期的一筆,要刪除整組分期嗎?\n確定=刪整組,取消=只刪這一筆")) {
                    ctx.deleteInstallmentGroup(t.installmentGroupId);
                  } else if (confirm("確定刪除?")) {
                    ctx.deleteTransaction(t.id);
                  }
                }}
              />
            ))}
          </div>
        )}
      </div>

      {editingTx && (
        <EditTxModal tx={editingTx} ctx={ctx} onClose={() => setEditingTx(null)} />
      )}
    </div>
  );
}

// ===================== 月曆頁 =====================
function CalendarTab({ ctx }) {
  const { viewYear, viewMonth, setViewYear, setViewMonth } = ctx;
  const [selectedDay, setSelectedDay] = useState(null);
  const [filterCategory, setFilterCategory] = useState("全部");
  const [editingTx, setEditingTx] = useState(null);
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("全部"); // 全部/支出/收入
  const [showFilter, setShowFilter] = useState(false);
  const [showMonthPicker, setShowMonthPicker] = useState(false);

  const categories = ["全部", ...Object.keys(getCT())];

  const monthTxs = ctx.state.transactions.filter(t => {
    const d = new Date(t.date);
    if (d.getFullYear() !== viewYear || d.getMonth() + 1 !== viewMonth) return false;
    if (filterCategory !== "全部" && t.category !== filterCategory) return false;
    if (typeFilter !== "全部" && t.type !== typeFilter) return false;
    if (search && !(t.note || "").includes(search) && !(t.subcategory || "").includes(search)) return false;
    return true;
  });

  const expenseTxs = monthTxs.filter(t => t.type === "支出");
  const incomeTxs = monthTxs.filter(t => t.type === "收入");
  const totalExpense = expenseTxs.reduce((s, t) => s + t.amount, 0);
  const totalIncome = incomeTxs.reduce((s, t) => s + t.amount, 0);

  const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();
  // 禮拜一為一週第一天:Sun=0 → 6, Mon=1 → 0, ..., Sat=6 → 5
  const firstWeekday = (new Date(viewYear, viewMonth - 1, 1).getDay() + 6) % 7;
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === viewYear && today.getMonth() + 1 === viewMonth;
  const isPastMonth = (today.getFullYear() > viewYear) || (today.getFullYear() === viewYear && today.getMonth() + 1 > viewMonth);
  const isToday = (d) => isCurrentMonth && today.getDate() === d;

  // 每日的收/支分開
  const dayIncome = {};
  const dayExpense = {};
  monthTxs.forEach(t => {
    const d = parseInt(t.date.slice(8, 10));
    if (t.type === "支出") dayExpense[d] = (dayExpense[d] || 0) + t.amount;
    else if (t.type === "收入") dayIncome[d] = (dayIncome[d] || 0) + t.amount;
  });

  const goPrev = () => {
    if (viewMonth === 1) { setViewYear(viewYear - 1); setViewMonth(12); }
    else setViewMonth(viewMonth - 1);
  };
  const goNext = () => {
    if (viewMonth === 12) { setViewYear(viewYear + 1); setViewMonth(1); }
    else setViewMonth(viewMonth + 1);
  };

  // 日均 = 支出 ÷ 本月總天數(所有月份一律除以整月天數)
  const daysForAvg = daysInMonth;
  const avgPerDay = daysForAvg > 0 ? Math.round(totalExpense / daysForAvg) : 0;

  const daySelectedTxs = selectedDay
    ? monthTxs.filter(t => parseInt(t.date.slice(8, 10)) === selectedDay)
    : [];

  const reset = () => { setSearch(""); setFilterCategory("全部"); setTypeFilter("全部"); };

  return (
    <div className="p-4">
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        {/* 月份導航 */}
        <div className="flex items-center justify-between mb-3 relative">
          <button onClick={goPrev} className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-xl">‹</button>
          <button
            onClick={() => setShowMonthPicker(v => !v)}
            className="text-2xl font-bold px-3 py-1 rounded-lg hover:bg-gray-100 active:bg-gray-200 transition"
          >{viewYear}/{viewMonth} <span className="text-sm text-gray-400">▾</span></button>
          <button onClick={goNext} className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-xl">›</button>
          {showMonthPicker && (
            <div className="absolute top-12 left-1/2 -translate-x-1/2 bg-white rounded-2xl shadow-xl border border-gray-200 p-3 z-20 w-64">
              <div className="flex items-center justify-between mb-2">
                <button
                  onClick={() => setViewYear(viewYear - 1)}
                  className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center"
                >‹</button>
                <div className="font-bold text-lg">{viewYear} 年</div>
                <button
                  onClick={() => setViewYear(viewYear + 1)}
                  className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center"
                >›</button>
              </div>
              <div className="grid grid-cols-4 gap-1.5">
                {Array.from({ length: 12 }).map((_, i) => {
                  const m = i + 1;
                  const active = m === viewMonth;
                  return (
                    <button
                      key={m}
                      onClick={() => { setViewMonth(m); setShowMonthPicker(false); }}
                      className={`py-2 rounded-lg text-sm font-medium transition ${
                        active ? "bg-blue-500 text-white" : "bg-gray-50 text-gray-700 hover:bg-gray-100"
                      }`}
                    >{m}月</button>
                  );
                })}
              </div>
              <button
                onClick={() => {
                  const now = new Date();
                  setViewYear(now.getFullYear());
                  setViewMonth(now.getMonth() + 1);
                  setShowMonthPicker(false);
                }}
                className="w-full mt-2 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-medium"
              >回到本月</button>
            </div>
          )}
        </div>

        {/* 搜尋 + 篩選切換 */}
        <div className="flex gap-2 mb-3">
          <input
            type="text"
            placeholder="🔍 搜尋備註、子分類..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            className="flex-1 p-2 border border-gray-200 rounded-lg text-sm"
          />
          <button
            onClick={() => setShowFilter(!showFilter)}
            className={`px-3 rounded-lg text-sm ${showFilter ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"}`}
          >篩選{(filterCategory !== "全部" || typeFilter !== "全部") && " •"}</button>
        </div>

        {showFilter && (
          <div className="bg-gray-50 rounded-lg p-2 mb-3 space-y-2">
            <div>
              <div className="text-xs text-gray-500 mb-1">類型</div>
              <div className="flex gap-2">
                {["全部", "支出", "收入"].map(t => (
                  <button
                    key={t}
                    onClick={() => setTypeFilter(t)}
                    className={`flex-1 py-1.5 rounded text-sm ${
                      typeFilter === t
                        ? (t === "支出" ? "bg-red-500 text-white" : t === "收入" ? "bg-green-500 text-white" : "bg-blue-500 text-white")
                        : "bg-white"
                    }`}
                  >{t}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="text-xs text-gray-500 mb-1">類別</div>
              <div className="flex flex-wrap gap-1.5">
                {categories.map(c => (
                  <button
                    key={c}
                    onClick={() => setFilterCategory(c)}
                    className={`px-2.5 py-1 rounded-full text-xs whitespace-nowrap transition ${
                      filterCategory === c ? "bg-blue-500 text-white" : "bg-white text-gray-700"
                    }`}
                  >{c === "全部" ? c : (getCT(c)?.icon + " " + c)}</button>
                ))}
              </div>
            </div>
            <button onClick={reset} className="w-full py-1.5 bg-white border border-gray-200 rounded text-xs text-gray-600">重設篩選</button>
          </div>
        )}

        {/* 統計 */}
        <div className="grid grid-cols-3 gap-2 mb-3">
          <div className="bg-red-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">支出</div>
            <div className="font-bold text-red-500">{fmtMoney(totalExpense)}</div>
          </div>
          <div className="bg-green-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">收入</div>
            <div className="font-bold text-green-500">{fmtMoney(totalIncome)}</div>
          </div>
          <div className="bg-blue-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">
              日均
              <span className="text-[9px] text-gray-400 block">÷{daysInMonth}天</span>
            </div>
            <div className="font-bold text-blue-500">{fmtMoney(avgPerDay)}</div>
          </div>
        </div>

        {/* 月曆格子(禮拜一為一週第一天) */}
        <div className="grid grid-cols-7 gap-1 text-xs text-gray-400 mb-1">
          {["一", "二", "三", "四", "五", "六", "日"].map(d => (
            <div key={d} className="text-center py-1 font-medium">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {Array.from({ length: firstWeekday }).map((_, i) => (
            <div key={"b" + i} />
          ))}
          {Array.from({ length: daysInMonth }).map((_, i) => {
            const day = i + 1;
            const inc = dayIncome[day] || 0;
            const exp = dayExpense[day] || 0;
            const active = selectedDay === day;
            const hasAny = inc > 0 || exp > 0;
            return (
              <button
                key={day}
                onClick={() => setSelectedDay(day === selectedDay ? null : day)}
                className={`aspect-square rounded-lg flex flex-col items-center justify-center transition px-0.5 ${
                  active ? "bg-blue-500 text-white" :
                  hasAny ? "bg-gray-50" : "bg-gray-50"
                } ${isToday(day) && !active ? "ring-2 ring-blue-400" : ""}`}
              >
                <div className={`text-sm font-semibold leading-none ${isToday(day) && !active ? "text-blue-500" : ""}`}>{day}</div>
                {inc > 0 && (
                  <div className={`text-[9px] leading-tight mt-0.5 ${active ? "text-white" : "text-green-600"}`}>
                    +{inc >= 10000 ? (inc/1000).toFixed(0)+"k" : inc}
                  </div>
                )}
                {exp > 0 && (
                  <div className={`text-[9px] leading-tight ${active ? "text-white" : "text-red-500"}`}>
                    -{exp >= 10000 ? (exp/1000).toFixed(0)+"k" : exp}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </div>

      {/* 當日明細 or 全月明細(有篩選條件時) */}
      <div className="bg-white rounded-2xl shadow-sm p-4">
        {selectedDay ? (
          <>
            <div className="flex justify-between items-center mb-3">
              <h3 className="font-semibold text-gray-700">{viewYear}/{viewMonth}/{selectedDay} 明細</h3>
              <button onClick={() => setSelectedDay(null)} className="text-xs text-gray-500">顯示全月</button>
            </div>
            {daySelectedTxs.length === 0 ? (
              <div className="text-center text-gray-400 py-6 text-sm">這天沒有符合的紀錄</div>
            ) : (
              <div className="space-y-1">
                {daySelectedTxs.map(t => (
                  <TxRow key={t.id} t={t}
                    onEdit={() => setEditingTx(t)}
                    onDelete={() => {
                      if (t.installmentGroupId && confirm("這是分期的一筆,要刪除整組分期嗎?\n確定=刪整組,取消=只刪這一筆")) {
                        ctx.deleteInstallmentGroup(t.installmentGroupId);
                      } else if (confirm("確定刪除?")) {
                        ctx.deleteTransaction(t.id);
                      }
                    }}
                  />
                ))}
              </div>
            )}
          </>
        ) : (
          <>
            <h3 className="font-semibold text-gray-700 mb-3">本月明細 ({monthTxs.length} 筆)</h3>
            {monthTxs.length === 0 ? (
              <div className="text-center text-gray-400 py-6 text-sm">沒有符合的紀錄</div>
            ) : (
              <div className="space-y-1 max-h-[50vh] overflow-y-auto">
                {[...monthTxs].sort((a,b) => b.date.localeCompare(a.date)).map(t => (
                  <TxRow key={t.id} t={t}
                    onEdit={() => setEditingTx(t)}
                    onDelete={() => {
                      if (t.installmentGroupId && confirm("這是分期的一筆,要刪除整組分期嗎?\n確定=刪整組,取消=只刪這一筆")) {
                        ctx.deleteInstallmentGroup(t.installmentGroupId);
                      } else if (confirm("確定刪除?")) {
                        ctx.deleteTransaction(t.id);
                      }
                    }}
                  />
                ))}
              </div>
            )}
          </>
        )}
      </div>

      {editingTx && (
        <EditTxModal tx={editingTx} ctx={ctx} onClose={() => setEditingTx(null)} />
      )}
    </div>
  );
}

// ===================== 信用卡核帳分頁 =====================
function CCReviewTab({ ctx }) {
  const { viewYear, viewMonth, setViewYear, setViewMonth } = ctx;
  const [editingTx, setEditingTx] = useState(null);
  const [showMonthPicker, setShowMonthPicker] = useState(false);

  const goPrev = () => {
    if (viewMonth === 1) { setViewYear(viewYear - 1); setViewMonth(12); }
    else setViewMonth(viewMonth - 1);
  };
  const goNext = () => {
    if (viewMonth === 12) { setViewYear(viewYear + 1); setViewMonth(1); }
    else setViewMonth(viewMonth + 1);
  };

  return (
    <div className="p-4">
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <div className="flex items-center justify-between relative">
          <button onClick={goPrev} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center">‹</button>
          <button
            onClick={() => setShowMonthPicker(v => !v)}
            className="text-lg font-bold px-3 py-1 rounded-lg hover:bg-gray-100 active:bg-gray-200 transition"
          >{viewYear}/{viewMonth} 信用卡核帳 <span className="text-sm text-gray-400">▾</span></button>
          <button onClick={goNext} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center">›</button>
          {showMonthPicker && (
            <div className="absolute top-12 left-1/2 -translate-x-1/2 bg-white rounded-2xl shadow-xl border border-gray-200 p-3 z-20 w-64">
              <div className="flex items-center justify-between mb-2">
                <button onClick={() => setViewYear(viewYear - 1)} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">‹</button>
                <div className="font-bold text-lg">{viewYear} 年</div>
                <button onClick={() => setViewYear(viewYear + 1)} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">›</button>
              </div>
              <div className="grid grid-cols-4 gap-1.5">
                {Array.from({ length: 12 }).map((_, i) => {
                  const m = i + 1;
                  const active = m === viewMonth;
                  return (
                    <button
                      key={m}
                      onClick={() => { setViewMonth(m); setShowMonthPicker(false); }}
                      className={`py-2 rounded-lg text-sm font-medium transition ${
                        active ? "bg-blue-500 text-white" : "bg-gray-50 text-gray-700 hover:bg-gray-100"
                      }`}
                    >{m}月</button>
                  );
                })}
              </div>
              <button
                onClick={() => {
                  const now = new Date();
                  setViewYear(now.getFullYear());
                  setViewMonth(now.getMonth() + 1);
                  setShowMonthPicker(false);
                }}
                className="w-full mt-2 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-medium"
              >回到本月</button>
            </div>
          )}
        </div>
      </div>
      <CCReviewView ctx={ctx} year={viewYear} month={viewMonth} onEdit={setEditingTx} />
      {editingTx && (
        <EditTxModal tx={editingTx} ctx={ctx} onClose={() => setEditingTx(null)} />
      )}
    </div>
  );
}

// ===================== 信用卡核帳 =====================
function CCReviewView({ ctx, year, month, onEdit }) {
  const ym = `${year}-${String(month).padStart(2,"0")}`;
  const creditCards = ctx.state.accounts.filter(a => a.type === "信用卡");
  const [selectedCard, setSelectedCard] = useState("全部");
  const [expected, setExpected] = useState({}); // 帳單金額(使用者輸入)

  // 本月信用卡支出
  const allCCTxs = ctx.state.transactions.filter(t => {
    if (t.type !== "支出") return false;
    if (!t.date.startsWith(ym)) return false;
    return creditCards.some(c => c.name === t.account);
  });

  // 依卡分組
  const byCard = {};
  creditCards.forEach(c => { byCard[c.name] = []; });
  allCCTxs.forEach(t => {
    if (!byCard[t.account]) byCard[t.account] = [];
    byCard[t.account].push(t);
  });

  const displayCards = selectedCard === "全部" ? creditCards : creditCards.filter(c => c.name === selectedCard);

  const toggleVerified = (txId) => {
    const t = ctx.state.transactions.find(x => x.id === txId);
    ctx.updateTransaction(txId, { verified: !t.verified });
  };

  const markAllVerified = (cardName, value) => {
    byCard[cardName].forEach(t => {
      ctx.updateTransaction(t.id, { verified: value });
    });
  };

  // 整月統計
  const grandTotal = allCCTxs.reduce((s, t) => s + t.amount, 0);
  const grandVerified = allCCTxs.filter(t => t.verified).reduce((s, t) => s + t.amount, 0);

  return (
    <>
      {/* 整月總計 */}
      <div className="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl shadow-sm p-4 mb-4">
        <div className="text-sm text-gray-600 mb-2">💳 {year}/{month} 信用卡總計</div>
        <div className="grid grid-cols-3 gap-2">
          <div className="bg-white rounded-lg p-2 text-center">
            <div className="text-[10px] text-gray-500">筆數</div>
            <div className="font-bold text-purple-600">{allCCTxs.length}</div>
          </div>
          <div className="bg-white rounded-lg p-2 text-center">
            <div className="text-[10px] text-gray-500">總金額</div>
            <div className="font-bold text-purple-600 text-sm">{fmtMoney(grandTotal)}</div>
          </div>
          <div className="bg-white rounded-lg p-2 text-center">
            <div className="text-[10px] text-gray-500">已核對</div>
            <div className="font-bold text-green-600 text-sm">{fmtMoney(grandVerified)}</div>
          </div>
        </div>
      </div>

      {/* 卡別切換 */}
      {creditCards.length > 1 && (
        <div className="flex gap-1.5 overflow-x-auto no-scrollbar mb-3 pb-1">
          <button
            onClick={() => setSelectedCard("全部")}
            className={`px-3 py-1.5 rounded-full text-xs whitespace-nowrap ${
              selectedCard === "全部" ? "bg-purple-500 text-white" : "bg-gray-100 text-gray-700"
            }`}
          >全部</button>
          {creditCards.map(c => (
            <button
              key={c.id}
              onClick={() => setSelectedCard(c.name)}
              className={`px-3 py-1.5 rounded-full text-xs whitespace-nowrap ${
                selectedCard === c.name ? "bg-purple-500 text-white" : "bg-gray-100 text-gray-700"
              }`}
            >{c.name}{c.last4 ? ` (${c.last4})` : ""}</button>
          ))}
        </div>
      )}

      {creditCards.length === 0 && (
        <div className="bg-white rounded-2xl shadow-sm p-8 text-center text-gray-400 text-sm">
          尚未建立信用卡帳戶。請到「設定 → 帳戶管理」新增。
        </div>
      )}

      {displayCards.map(card => {
        const txs = byCard[card.name] || [];
        const cardTotal = txs.reduce((s, t) => s + t.amount, 0);
        const verifiedTotal = txs.filter(t => t.verified).reduce((s, t) => s + t.amount, 0);
        const unverifiedTotal = cardTotal - verifiedTotal;
        const expectedAmt = parseFloat(expected[card.id]) || 0;
        const diff = expectedAmt ? expectedAmt - cardTotal : 0;

        // 依子分類統計
        const byCat = {};
        txs.forEach(t => {
          const key = t.category;
          if (!byCat[key]) byCat[key] = { count: 0, total: 0 };
          byCat[key].count++;
          byCat[key].total += t.amount;
        });
        const catEntries = Object.entries(byCat).sort((a,b) => b[1].total - a[1].total);

        return (
          <div key={card.id} className="bg-white rounded-2xl shadow-sm p-4 mb-4">
            {/* 卡頭 */}
            <div className="flex items-center justify-between mb-3 pb-3 border-b">
              <div>
                <div className="font-bold text-gray-800">💳 {card.name}</div>
                <div className="text-[11px] text-gray-500">
                  {card.last4 && `末4碼 ${card.last4}`}
                  {card.statementDay && ` · 結帳 ${card.statementDay} 號`}
                  {card.dueDay && ` · 繳費 ${card.dueDay} 號`}
                </div>
              </div>
              <div className="text-right">
                <div className="text-[10px] text-gray-500">本月已用</div>
                <div className="font-bold text-red-500">{fmtMoney(cardTotal)}</div>
              </div>
            </div>

            {/* 核對輸入 */}
            <div className="bg-yellow-50 rounded-lg p-2.5 mb-3">
              <div className="text-xs text-gray-600 mb-1">📄 實際帳單金額(輸入後自動比對)</div>
              <div className="flex items-center gap-2">
                <input
                  type="number"
                  placeholder="例如 4335"
                  value={expected[card.id] || ""}
                  onChange={e => setExpected({ ...expected, [card.id]: e.target.value })}
                  className="flex-1 p-2 border border-gray-200 rounded text-sm"
                />
                {expectedAmt > 0 && (
                  <div className={`text-sm font-semibold ${Math.abs(diff) < 1 ? "text-green-600" : "text-red-500"}`}>
                    {Math.abs(diff) < 1 ? "✓ 吻合" : `差 ${fmtMoney(diff)}`}
                  </div>
                )}
              </div>
            </div>

            {/* 子統計 */}
            {catEntries.length > 0 && (
              <div className="mb-3">
                <div className="text-xs text-gray-500 mb-1.5">📊 本卡消費分類</div>
                <div className="flex flex-wrap gap-1.5">
                  {catEntries.map(([c, v]) => (
                    <div key={c} className={`px-2 py-1 rounded text-xs ${getCT(c)?.color || "bg-gray-100"}`}>
                      {getCT(c)?.icon || "•"} {c} · {fmtMoney(v.total)} ({v.count})
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* 全選按鈕 */}
            {txs.length > 0 && (
              <div className="flex justify-between items-center mb-2">
                <div className="text-xs text-gray-500">
                  已核 {txs.filter(t => t.verified).length}/{txs.length} 筆 · {fmtMoney(verifiedTotal)}
                  {unverifiedTotal > 0 && <span className="text-orange-500"> · 待核 {fmtMoney(unverifiedTotal)}</span>}
                </div>
                <div className="flex gap-1">
                  <button
                    onClick={() => markAllVerified(card.name, true)}
                    className="px-2 py-0.5 text-[11px] bg-green-100 text-green-600 rounded"
                  >全核對</button>
                  <button
                    onClick={() => markAllVerified(card.name, false)}
                    className="px-2 py-0.5 text-[11px] bg-gray-100 text-gray-600 rounded"
                  >全清除</button>
                </div>
              </div>
            )}

            {/* 明細 */}
            {txs.length === 0 ? (
              <div className="text-center text-gray-400 py-4 text-xs">本月這張卡沒有支出</div>
            ) : (
              <div className="space-y-1">
                {txs.sort((a,b) => a.date.localeCompare(b.date)).map(t => (
                  <div key={t.id} className={`flex items-center gap-2 p-2 rounded-lg ${t.verified ? "bg-green-50" : "hover:bg-gray-50"}`}>
                    <button
                      onClick={() => toggleVerified(t.id)}
                      className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs flex-shrink-0 ${
                        t.verified ? "bg-green-500 border-green-500 text-white" : "bg-white border-gray-300"
                      }`}
                    >{t.verified ? "✓" : ""}</button>
                    <button
                      onClick={() => onEdit(t)}
                      className="flex-1 min-w-0 text-left"
                    >
                      <div className="text-sm font-medium truncate">
                        {getCT(t.category)?.icon} {t.note || t.subcategory || t.category}
                      </div>
                      <div className="text-[11px] text-gray-500 truncate">
                        {t.date.slice(5)} · {t.category}{t.subcategory ? "/"+t.subcategory : ""}
                        {t.installmentGroupId && <span className="ml-1 bg-yellow-100 text-yellow-700 px-1 rounded text-[10px]">分期</span>}
                      </div>
                    </button>
                    <div className="font-bold text-sm text-red-500 flex-shrink-0">
                      -{fmtMoney(t.amount)}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

// ===================== 篩選頁 =====================
function FilterTab({ ctx }) {
  const [search, setSearch] = useState("");
  const [category, setCategory] = useState("全部");
  const [monthFilter, setMonthFilter] = useState("全年");
  const [yearFilter, setYearFilter] = useState(ctx.viewYear);
  const [typeFilter, setTypeFilter] = useState("全部");
  const [editingTx, setEditingTx] = useState(null);

  const categories = ["全部", ...Object.keys(getCT())];
  const months = ["全年", ...Array.from({length:12}, (_,i) => (i+1)+"月")];
  const years = Array.from(new Set(ctx.state.transactions.map(t => new Date(t.date).getFullYear())));
  if (!years.includes(yearFilter)) years.push(yearFilter);
  years.sort((a,b) => b - a);

  const filtered = ctx.state.transactions.filter(t => {
    const d = new Date(t.date);
    if (d.getFullYear() !== yearFilter) return false;
    if (monthFilter !== "全年" && d.getMonth() + 1 !== parseInt(monthFilter)) return false;
    if (category !== "全部" && t.category !== category) return false;
    if (typeFilter !== "全部" && t.type !== typeFilter) return false;
    if (search && !(t.note || "").includes(search) && !(t.subcategory || "").includes(search)) return false;
    return true;
  }).sort((a,b) => b.date.localeCompare(a.date));

  const reset = () => { setSearch(""); setCategory("全部"); setMonthFilter("全年"); setTypeFilter("全部"); };

  const totalExpense = filtered.filter(t => t.type === "支出").reduce((s,t) => s + t.amount, 0);
  const totalIncome = filtered.filter(t => t.type === "收入").reduce((s,t) => s + t.amount, 0);
  const uniqueDays = new Set(filtered.map(t => t.date)).size;
  const dailyAvg = uniqueDays > 0 ? Math.round(totalExpense / uniqueDays) : 0;

  return (
    <div className="p-4">
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1">項目搜尋</div>
          <input
            type="text"
            placeholder="輸入項目名稱..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            className="w-full p-2.5 border border-gray-200 rounded-lg"
          />
        </div>

        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1.5">類別</div>
          <div className="flex flex-wrap gap-2">
            {categories.map(c => (
              <button
                key={c}
                onClick={() => setCategory(c)}
                className={`px-3 py-1.5 rounded-full text-sm transition ${
                  category === c ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"
                }`}
              >{c === "全部" ? c : getCT(c)?.icon + " " + c}</button>
            ))}
          </div>
        </div>

        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1.5">年份</div>
          <div className="flex gap-2 overflow-x-auto no-scrollbar">
            {years.map(y => (
              <button
                key={y}
                onClick={() => setYearFilter(y)}
                className={`px-3 py-1.5 rounded-full text-sm whitespace-nowrap transition ${
                  yearFilter === y ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"
                }`}
              >{y}</button>
            ))}
          </div>
        </div>

        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1.5">月份</div>
          <div className="flex gap-2 overflow-x-auto no-scrollbar">
            {months.map(m => (
              <button
                key={m}
                onClick={() => setMonthFilter(m === "全年" ? "全年" : m.replace("月",""))}
                className={`px-3 py-1.5 rounded-full text-sm whitespace-nowrap transition ${
                  (monthFilter === "全年" && m === "全年") || monthFilter === m.replace("月","")
                    ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"
                }`}
              >{m}</button>
            ))}
          </div>
        </div>

        <div className="flex gap-2 mb-3">
          {["全部", "支出", "收入"].map(t => (
            <button
              key={t}
              onClick={() => setTypeFilter(t)}
              className={`flex-1 py-2 rounded-lg text-sm transition ${
                typeFilter === t ? (t === "支出" ? "bg-red-500 text-white" : t === "收入" ? "bg-green-500 text-white" : "bg-blue-500 text-white") : "bg-gray-100"
              }`}
            >{t}</button>
          ))}
        </div>

        <button onClick={reset} className="w-full py-2 bg-gray-100 rounded-lg text-gray-700 text-sm">重設</button>
      </div>

      {/* 統計 */}
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div className="bg-blue-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">{filtered.length} 筆</div>
            <div className="font-bold text-blue-600">日均 {fmtMoney(dailyAvg)}</div>
          </div>
          <div className="bg-green-50 rounded-lg p-2 text-center">
            <div className="text-xs text-gray-500">收入</div>
            <div className="font-bold text-green-600">{fmtMoney(totalIncome)}</div>
          </div>
        </div>
        <div className="bg-red-50 rounded-lg p-2 text-center">
          <div className="text-xs text-gray-500">支出總額</div>
          <div className="font-bold text-red-500 text-lg">{fmtMoney(totalExpense)}</div>
        </div>
      </div>

      {/* 列表 */}
      <div className="bg-white rounded-2xl shadow-sm p-4">
        <h3 className="font-semibold text-gray-700 mb-3">明細({filtered.length} 筆)</h3>
        {filtered.length === 0 ? (
          <div className="text-center text-gray-400 py-6 text-sm">找不到紀錄</div>
        ) : (
          <div className="space-y-1 max-h-[60vh] overflow-y-auto">
            {filtered.map(t => (
              <TxRow key={t.id} t={t}
                onEdit={() => setEditingTx(t)}
                onDelete={() => {
                  if (t.installmentGroupId && confirm("這是分期的一筆,要刪除整組分期嗎?\n確定=刪整組,取消=只刪這一筆")) {
                    ctx.deleteInstallmentGroup(t.installmentGroupId);
                  } else if (confirm("確定刪除?")) {
                    ctx.deleteTransaction(t.id);
                  }
                }}
              />
            ))}
          </div>
        )}
      </div>

      {editingTx && (
        <EditTxModal tx={editingTx} ctx={ctx} onClose={() => setEditingTx(null)} />
      )}
    </div>
  );
}

// ===================== 月結頁(月結/儲蓄/分期) =====================
function CompareTab({ ctx }) {
  const { viewYear, viewMonth, setViewYear, setViewMonth } = ctx;
  const [section, setSection] = useState("月結");
  const [showMonthPicker, setShowMonthPicker] = useState(false);

  const ym = `${viewYear}-${String(viewMonth).padStart(2,"0")}`;
  const monthTxs = ctx.state.transactions.filter(t => t.date.startsWith(ym));
  const expense = monthTxs.filter(t => t.type === "支出").reduce((s,t) => s + t.amount, 0);
  const income = monthTxs.filter(t => t.type === "收入").reduce((s,t) => s + t.amount, 0)
    || ctx.state.monthlyIncomes[ym]
    || ctx.state.budget.income;

  const byCategory = {};
  monthTxs.filter(t => t.type === "支出").forEach(t => {
    byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
  });

  // 分期 — 本月到期款項
  const installmentTxs = monthTxs.filter(t => t.installmentGroupId);
  const installmentGroups = {};
  ctx.state.transactions.filter(t => t.installmentGroupId).forEach(t => {
    if (!installmentGroups[t.installmentGroupId]) {
      installmentGroups[t.installmentGroupId] = { items: [], note: t.note, account: t.account, category: t.category };
    }
    installmentGroups[t.installmentGroupId].items.push(t);
  });

  const goPrev = () => {
    if (viewMonth === 1) { setViewYear(viewYear - 1); setViewMonth(12); }
    else setViewMonth(viewMonth - 1);
  };
  const goNext = () => {
    if (viewMonth === 12) { setViewYear(viewYear + 1); setViewMonth(1); }
    else setViewMonth(viewMonth + 1);
  };

  return (
    <div className="p-4">
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <div className="flex items-center justify-between mb-3 relative">
          <button onClick={goPrev} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center">‹</button>
          <button
            onClick={() => setShowMonthPicker(v => !v)}
            className="text-lg font-bold px-3 py-1 rounded-lg hover:bg-gray-100 active:bg-gray-200 transition"
          >{viewYear} / {viewMonth}月 <span className="text-sm text-gray-400">▾</span></button>
          <button onClick={goNext} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center">›</button>
          {showMonthPicker && (
            <div className="absolute top-12 left-1/2 -translate-x-1/2 bg-white rounded-2xl shadow-xl border border-gray-200 p-3 z-20 w-64">
              <div className="flex items-center justify-between mb-2">
                <button onClick={() => setViewYear(viewYear - 1)} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">‹</button>
                <div className="font-bold text-lg">{viewYear} 年</div>
                <button onClick={() => setViewYear(viewYear + 1)} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">›</button>
              </div>
              <div className="grid grid-cols-4 gap-1.5">
                {Array.from({ length: 12 }).map((_, i) => {
                  const m = i + 1;
                  const active = m === viewMonth;
                  return (
                    <button
                      key={m}
                      onClick={() => { setViewMonth(m); setShowMonthPicker(false); }}
                      className={`py-2 rounded-lg text-sm font-medium transition ${
                        active ? "bg-blue-500 text-white" : "bg-gray-50 text-gray-700 hover:bg-gray-100"
                      }`}
                    >{m}月</button>
                  );
                })}
              </div>
              <button
                onClick={() => {
                  const now = new Date();
                  setViewYear(now.getFullYear());
                  setViewMonth(now.getMonth() + 1);
                  setShowMonthPicker(false);
                }}
                className="w-full mt-2 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-medium"
              >回到本月</button>
            </div>
          )}
        </div>

        <div className="grid grid-cols-4 gap-1.5 mb-2">
          {["月結", "儲蓄目標", "分期追蹤", "台股"].map(s => (
            <button
              key={s}
              onClick={() => setSection(s)}
              className={`py-2 rounded-lg text-xs transition ${
                section === s ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"
              }`}
            >{s}</button>
          ))}
        </div>
      </div>

      {section === "月結" && (
        <MonthlyBudget ctx={ctx} ym={ym} income={income} expense={expense} byCategory={byCategory} />
      )}
      {section === "儲蓄目標" && (
        <GoalsSection ctx={ctx} />
      )}
      {section === "分期追蹤" && (
        <InstallmentSection ctx={ctx} groups={installmentGroups} />
      )}
      {section === "台股" && (
        <StocksSection ctx={ctx} />
      )}
    </div>
  );
}

function MonthlyBudget({ ctx, ym, income, expense, byCategory }) {
  // 本月交易
  const monthTxs = ctx.state.transactions.filter(t => t.date.startsWith(ym));
  const installmentExpense = monthTxs
    .filter(t => t.installmentGroupId && t.type === "支出")
    .reduce((s, t) => s + t.amount, 0);

  // 本月信用卡相關(不管是不是分期)
  const ccAccNames = ctx.state.accounts
    .filter(a => a.type === "信用卡")
    .map(a => a.name);
  const ccSpent = monthTxs
    .filter(t => t.type === "支出" && ccAccNames.includes(t.account))
    .reduce((s, t) => s + t.amount, 0);
  const ccInstallment = monthTxs
    .filter(t => t.type === "支出" && t.installmentGroupId && ccAccNames.includes(t.account))
    .reduce((s, t) => s + t.amount, 0);
  const ccOther = ccSpent - ccInstallment;

  // 僅篩出當月有效的固定支出(endMonth 為空或 >= 本月)
  const activeFixedExp = (ctx.state.fixedExpenses || []).filter(f => !f.endMonth || f.endMonth >= ym);

  // 計算每個固定支出的實際金額
  // 信用卡類的「實際」= 本月分期 (不含非分期消費)
  const fixedActual = activeFixedExp.map(f => {
    // 自動扣款 → 直接用預算金額當實際
    if (f.autoDeduct) {
      return { ...f, actual: parseFloat(f.amount) || 0, isAuto: true };
    }
    let actual = 0;
    let isCC = false;
    if (f.matchType === "accountType") {
      const accNames = ctx.state.accounts
        .filter(a => a.type === f.matchValue)
        .map(a => a.name);
      if (f.matchValue === "信用卡") {
        isCC = true;
        // 信用卡的「實際」只算本月分期
        actual = monthTxs
          .filter(t => t.type === "支出" && t.installmentGroupId && accNames.includes(t.account))
          .reduce((s, t) => s + t.amount, 0);
      } else {
        actual = monthTxs
          .filter(t => t.type === "支出" && accNames.includes(t.account))
          .reduce((s, t) => s + t.amount, 0);
      }
    } else if (f.matchType === "category") {
      actual = monthTxs
        .filter(t => t.type === "支出" && t.category === f.matchValue)
        .reduce((s, t) => s + t.amount, 0);
    } else if (f.matchType === "account") {
      const acc = ctx.state.accounts.find(a => a.name === f.matchValue);
      if (acc && acc.type === "信用卡") {
        isCC = true;
        // 信用卡帳戶 → 只算本月分期
        actual = monthTxs
          .filter(t => t.type === "支出" && t.installmentGroupId && t.account === f.matchValue)
          .reduce((s, t) => s + t.amount, 0);
      } else {
        actual = monthTxs
          .filter(t => t.type === "支出" && t.account === f.matchValue)
          .reduce((s, t) => s + t.amount, 0);
      }
    }
    return { ...f, actual, isAuto: false, isCC };
  });

  // 自動加入:信用卡分期(即使沒有在固定支出裡設定)
  // 只要本月有信用卡分期交易,就在固定支出區塊自動顯示一筆,不用使用者手動設定
  if (ccInstallment > 0 && !fixedActual.some(f => f.isCC)) {
    fixedActual.unshift({
      id: "__cc_auto__",
      name: "信用卡分期",
      actual: ccInstallment,
      amount: 0,
      isAuto: false,
      isCC: true,
      endMonth: ""
    });
  }

  const totalFixedBudget = activeFixedExp.reduce((s, f) => s + (parseFloat(f.amount) || 0), 0);
  // 自動扣款的固定支出(不會出現在 transactions)
  const autoFixedTotal = fixedActual.filter(f => f.isAuto).reduce((s, f) => s + f.actual, 0);
  // 總固定支出實際
  const totalFixedActual = fixedActual.reduce((s, f) => s + f.actual, 0);

  // 本月已花 = 所有交易支出 + 自動扣款(因為自動扣款不在交易裡)
  const totalSpent = expense + autoFixedTotal;

  // 結餘 = 收入 − 固定支出(呼應你的想法:收入扣掉固定必花的)
  const hasIncome = income > 0;
  const balance = hasIncome ? income - totalFixedActual : 0;

  // 本月可支配 = 預算 − 本月信用卡已刷(配合你的使用習慣:扣掉信用卡已刷的就是還能花的)
  const monthlyBudget = parseFloat(ctx.state.budget?.monthlyBudget || 0);
  const hasBudget = monthlyBudget > 0;
  const disposable = hasBudget ? monthlyBudget - ccSpent : null;

  return (
    <>
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <h3 className="font-semibold text-gray-700 mb-3">本月總覽</h3>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <div className="bg-green-50 rounded-lg p-3 text-center">
            <div className="text-xs text-gray-500">收入</div>
            <div className="font-bold text-green-600">{fmtMoney(income)}</div>
          </div>
          <div className="bg-red-50 rounded-lg p-3 text-center">
            <div className="text-xs text-gray-500">本月已花</div>
            <div className="font-bold text-red-500">{fmtMoney(totalSpent)}</div>
          </div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          <div className="bg-purple-50 rounded-lg p-3 text-center">
            <div className="text-xs text-gray-500">固定支出</div>
            <div className="font-bold text-purple-600">{fmtMoney(totalFixedActual)}</div>
          </div>
          {hasIncome ? (
            <div className={`${balance >= 0 ? "bg-blue-50" : "bg-orange-50"} rounded-lg p-3 text-center`}>
              <div className="text-xs text-gray-500">結餘(收入-固定支出)</div>
              <div className={`font-bold ${balance >= 0 ? "text-blue-600" : "text-orange-600"}`}>{fmtMoney(balance)}</div>
            </div>
          ) : (
            <div className="bg-gray-50 rounded-lg p-3 text-center">
              <div className="text-xs text-gray-400">結餘</div>
              <div className="font-bold text-gray-400 text-sm">尚未設定收入</div>
            </div>
          )}
        </div>

        {/* 信用卡本月已刷(呼應「該月信用卡已經花了多少」) */}
        {ccAccNames.length > 0 && (
          <div className="bg-gradient-to-r from-pink-50 to-rose-50 rounded-lg p-3 mb-2">
            <div className="text-xs text-gray-500 mb-1">💳 本月信用卡已刷</div>
            <div className="flex items-center justify-between">
              <div className="text-xl font-bold text-rose-600">{fmtMoney(ccSpent)}</div>
              <div className="text-[11px] text-gray-500 text-right leading-tight">
                <div>分期 <span className="text-red-500 font-semibold">{fmtMoney(ccInstallment)}</span></div>
                <div>其他 <span className="text-gray-700 font-semibold">{fmtMoney(ccOther)}</span></div>
              </div>
            </div>
          </div>
        )}

        {hasBudget && (
          <div className="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-lg p-3">
            <div className="text-xs text-gray-500 mb-1">本月可支配(預算 - 本月信用卡已刷)</div>
            <div className="flex items-center justify-between">
              <div className={`text-xl font-bold ${disposable >= 0 ? "text-orange-600" : "text-red-600"}`}>
                {fmtMoney(disposable)}
              </div>
              <div className="text-[11px] text-gray-500 text-right leading-tight">
                預算 <span className="text-gray-700 font-semibold">{fmtMoney(monthlyBudget)}</span><br/>
                信用卡已刷 <span className="text-red-500 font-semibold">-{fmtMoney(ccSpent)}</span>
              </div>
            </div>
          </div>
        )}
        {!hasBudget && (
          <div className="bg-gray-50 rounded-lg p-3 text-center text-xs text-gray-500">
            💡 到「設定 → 每月可支配預算」填入預算,這裡就會顯示還能花多少
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl shadow-sm p-4 mb-4">
        <div className="flex justify-between items-center mb-3">
          <h3 className="font-semibold text-gray-700">固定支出</h3>
          <span className="text-xs text-gray-400">可在「設定」新增</span>
        </div>
        {fixedActual.length === 0 ? (
          <div className="text-center text-gray-400 py-4 text-sm">還沒有固定支出。到設定頁新增。</div>
        ) : fixedActual.map(f => {
          const budgetAmt = parseFloat(f.amount) || 0;
          const pct = budgetAmt > 0 ? Math.min(100, (f.actual / budgetAmt) * 100) : 0;

          // 信用卡類:獨立卡片式呈現,只顯示本月分期總額(不用 /預算 與進度條)
          if (f.isCC) {
            return (
              <div key={f.id} className="mb-2 flex items-center justify-between bg-indigo-50 rounded-lg px-3 py-2">
                <div className="flex items-center gap-2 min-w-0">
                  <span className="text-lg">💳</span>
                  <div className="min-w-0">
                    <div className="text-sm font-medium truncate">{f.name}</div>
                    <div className="text-[10px] text-indigo-500">本月分期自動加總{f.endMonth && ` · 至 ${f.endMonth}`}</div>
                  </div>
                </div>
                <div className="text-right">
                  <div className="text-sm font-semibold text-indigo-700">{fmtMoney(f.actual)}</div>
                  <div className="text-[10px] text-gray-400">本月</div>
                </div>
              </div>
            );
          }

          return (
            <div key={f.id} className="mb-2">
              <div className="flex justify-between text-sm mb-1">
                <span>
                  {f.name}
                  {f.isAuto ? (
                    <span className="ml-1 text-[10px] bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded">自動扣款</span>
                  ) : (
                    <span className="text-xs text-gray-400 ml-1">
                      ({f.matchType === "accountType" ? ACCOUNT_TYPE_ICON[f.matchValue] + ACCOUNT_TYPE_LABEL[f.matchValue] :
                        f.matchType === "category" ? (getCT(f.matchValue)?.icon || "") + f.matchValue :
                        f.matchValue})
                    </span>
                  )}
                  {f.endMonth && <span className="text-[10px] text-gray-400 ml-1">至 {f.endMonth}</span>}
                </span>
                <span className={!f.isAuto && f.actual > budgetAmt ? "text-red-500 font-semibold" : "text-gray-600"}>
                  {f.isAuto ? fmtMoney(budgetAmt) : `${fmtMoney(f.actual)} / ${fmtMoney(budgetAmt)}`}
                </span>
              </div>
              {!f.isAuto && (
                <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                  <div
                    className={`h-full ${f.actual > budgetAmt ? "bg-red-400" : "bg-blue-400"}`}
                    style={{ width: pct + "%" }}
                  />
                </div>
              )}
            </div>
          );
        })}
        {fixedActual.length > 0 && (() => {
          const totalActual = fixedActual.reduce((s, f) => s + (f.actual || 0), 0);
          const totalBudget = fixedActual.reduce((s, f) => s + (f.isCC ? 0 : (parseFloat(f.amount) || 0)), 0);
          return (
            <div className="mt-3 pt-3 border-t border-gray-200 flex justify-between items-center">
              <span className="text-xs text-gray-500">
                固定支出合計
                {totalBudget > 0 && <span className="text-[10px] ml-1 text-gray-400">(預算 {fmtMoney(totalBudget)})</span>}
              </span>
              <span className={`font-bold text-sm ${totalBudget > 0 && totalActual > totalBudget ? "text-red-500" : "text-blue-600"}`}>
                {fmtMoney(totalActual)}
              </span>
            </div>
          );
        })()}
      </div>

      <div className="bg-white rounded-2xl shadow-sm p-4">
        <h3 className="font-semibold text-gray-700 mb-3">各類別支出</h3>
        {Object.keys(byCategory).length === 0 ? (
          <div className="text-center text-gray-400 py-4 text-sm">本月還沒有支出紀錄</div>
        ) : (
          <div className="space-y-2">
            {Object.entries(byCategory).sort((a,b) => b[1]-a[1]).map(([c, v]) => {
              const pct = expense > 0 ? (v / expense) * 100 : 0;
              return (
                <div key={c}>
                  <div className="flex justify-between text-sm mb-1">
                    <span>{getCT(c)?.icon} {c}</span>
                    <span className="text-gray-600">{fmtMoney(v)}({pct.toFixed(0)}%)</span>
                  </div>
                  <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-400" style={{ width: pct + "%" }} />
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}

function GoalsSection({ ctx }) {
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name: "", target: "", accountName: "", note: "", mode: "goal" });
  const [editingId, setEditingId] = useState(null);
  const [showDetailsFor, setShowDetailsFor] = useState(null);
  const [entry, setEntry] = useState({}); // { goalId: { type, amount, note, date } }

  const bankLikeAccounts = ctx.state.accounts.filter(a =>
    ["金融卡", "現金", "行動支付", "其他"].includes(a.type)
  );

  const openAddForm = () => {
    setForm({ name: "", target: "", accountName: bankLikeAccounts[0]?.name || "", note: "", mode: "goal" });
    setEditingId(null);
    setShowAdd(true);
  };

  const openEditForm = (g) => {
    setForm({
      name: g.name,
      target: g.target,
      accountName: g.accountName || "",
      note: g.note || "",
      mode: g.mode || "goal"
    });
    setEditingId(g.id);
    setShowAdd(true);
  };

  const handleSave = () => {
    if (!form.name) { alert("請填名稱"); return; }
    if (form.mode === "goal" && !form.target) { alert("目標模式請填目標金額"); return; }
    if (editingId) {
      ctx.updateGoalMeta(editingId, {
        name: form.name,
        target: form.mode === "piggy" ? 0 : (parseFloat(form.target) || 0),
        accountName: form.accountName,
        note: form.note,
        mode: form.mode
      });
    } else {
      ctx.addGoal({
        name: form.name,
        target: form.mode === "piggy" ? 0 : form.target,
        accountName: form.accountName,
        note: form.note,
        mode: form.mode
      });

    setShowAdd(false);
    setEditingId(null);

      goalId,
      type: e.type || "存入",
      amount: amt,
      date: e.date || todayStr(),
      note: e.note || ""
    });

            className="text-sm text-blue-500"
          >{showAdd ? "取消" : "+ 新目標"}</button>
        </div>
        <div className="grid grid-cols-1 gap-2">
          {goalModeGoals.length > 0 && (
            <div className="bg-gradient-to-r from-blue-50 to-purple-50 rounded-xl p-3">
              <div className="text-xs text-gray-500">🎯 目標累計 / 總目標</div>
              <div className="text-lg font-bold text-blue-600 mt-1">
                {fmtMoney(totalCurrent)} / {fmtMoney(totalTarget)}
              </div>
              <div className="h-2 bg-white rounded-full overflow-hidden mt-1">
                <div
                  className="h-full bg-gradient-to-r from-blue-400 to-purple-400"
                  style={{ width: totalTarget > 0 ? (totalCurrent/totalTarget*100) + "%" : "0%" }}
                />
              </div>
            </div>
          )}
          {piggyGoals.length > 0 && (
            <div className="bg-gradient-to-r from-pink-50 to-rose-50 rounded-xl p-3 text-center">
              <div className="text-xs text-gray-500">🐷 存錢筒總額</div>
              <div className="text-xl font-bold text-pink-600 mt-1">{fmtMoney(totalPiggy)}</div>
            </div>

            <div className="bg-gray-50 rounded-xl p-4 text-center text-sm text-gray-400">
              還沒有目標或存錢筒,點右上「+ 新目標」建立
            </div>

                <button

                  className={`py-2 rounded text-sm ${form.mode === "goal" ? "bg-blue-500 text-white" : "bg-white border border-gray-200"}`}
                >🎯 目標模式<div className="text-[10px] opacity-80">設定目標金額</div></button>
                <button
                  onClick={() => setForm({...form, mode: "piggy"})}
                  className={`py-2 rounded text-sm ${form.mode === "piggy" ? "bg-pink-500 text-white" : "bg-white border border-gray-200"}`}
                >🐷 存錢筒<div className="text-[10px] opacity-80">只存多少算多少</div></button>
              </div>
            </div>
            <input
              placeholder={form.mode === "piggy" ? "存錢筒名稱 (例:小豬撲滿)" : "目標名稱 (例:日本旅遊)"}
              value={form.name}
              onChange={e => setForm({...form, name: e.target.value})}
              className="w-full p-2 border border-gray-200 rounded"
            />
