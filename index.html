<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>我的記帳本</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f4f5f7; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  input, select, textarea, button { -webkit-tap-highlight-color: transparent; }
  [contenteditable]:focus { outline: none; }
</style>

<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ===================== 初始資料 =====================
const BUILTIN_ACCOUNT_TYPES = ["信用卡", "金融卡", "貸款", "行動支付", "現金", "其他"];
const BUILTIN_ACCOUNT_TYPE_ICON = {
  "信用卡": "💳", "金融卡": "🏧", "貸款": "🏦",
  "行動支付": "📱", "現金": "💵", "其他": "📦"
};

// 取得完整帳戶類型清單(內建 + 自訂 - 隱藏)。用 state 包裝以支援動態類型
// 內建類型的「canonical key」永遠是原名(如 "信用卡"),以確保 CC/貸款等商業邏輯不會因改名而失效;
// 使用者對內建類型的改名/換 icon 只是視覺 override,存在 state.builtinTypeOverrides[key] = { name, icon }
let __ACCOUNT_TYPES_CACHE = null;
let __ACCOUNT_TYPE_ICON_CACHE = null;
let __ACCOUNT_TYPE_LABEL_CACHE = null;
function rebuildAccountTypes(state) {
  const hidden = state?.hiddenAccountTypes || [];
  const custom = state?.customAccountTypes || [];
  const overrides = state?.builtinTypeOverrides || {};
  const types = BUILTIN_ACCOUNT_TYPES.filter(t => !hidden.includes(t)).concat(custom.map(c => c.name));
  const icon = {};
  const label = {};
  BUILTIN_ACCOUNT_TYPES.forEach(t => {
    icon[t] = (overrides[t] && overrides[t].icon) || BUILTIN_ACCOUNT_TYPE_ICON[t];
    label[t] = (overrides[t] && overrides[t].name) || t;
  });
  custom.forEach(c => { icon[c.name] = c.icon || "📦"; label[c.name] = c.name; });
  __ACCOUNT_TYPES_CACHE = types;
  __ACCOUNT_TYPE_ICON_CACHE = icon;
  __ACCOUNT_TYPE_LABEL_CACHE = label;
}
const ACCOUNT_TYPES = new Proxy([], {
  get(_, p) {
    const arr = __ACCOUNT_TYPES_CACHE || BUILTIN_ACCOUNT_TYPES;
    if (p === "length") return arr.length;
    if (p === Symbol.iterator) return arr[Symbol.iterator].bind(arr);
    if (typeof p === "string" && !isNaN(p)) return arr[p];
    if (typeof arr[p] === "function") return arr[p].bind(arr);
    return arr[p];
  }
});
const ACCOUNT_TYPE_ICON = new Proxy({}, {
  get(_, p) {
    const obj = __ACCOUNT_TYPE_ICON_CACHE || BUILTIN_ACCOUNT_TYPE_ICON;
    return obj[p];
  },
  ownKeys() { return Object.keys(__ACCOUNT_TYPE_ICON_CACHE || BUILTIN_ACCOUNT_TYPE_ICON); },
  getOwnPropertyDescriptor(_, p) {
    const obj = __ACCOUNT_TYPE_ICON_CACHE || BUILTIN_ACCOUNT_TYPE_ICON;
    return { enumerable: true, configurable: true, value: obj[p] };
  }
});
const ACCOUNT_TYPE_LABEL = new Proxy({}, {
  get(_, p) {
    const obj = __ACCOUNT_TYPE_LABEL_CACHE || {};
    return obj[p] || p;
  }
});
rebuildAccountTypes(null);

const DEFAULT_ACCOUNTS = [
  { id: "a1", name: "台新銀行信用卡", type: "信用卡", last4: "", expire: "", statementDay: "", dueDay: "", creditLimit: "", benefits: "", annualFee: "", openingBalance: 0, note: "" },
  { id: "a2", name: "聯邦銀行信用卡", type: "信用卡", last4: "", expire: "", statementDay: "", dueDay: "", creditLimit: "", benefits: "", annualFee: "", openingBalance: 0, note: "" },
  { id: "a3", name: "現金", type: "現金", openingBalance: 0, note: "" },
  { id: "a4", name: "其他", type: "其他", openingBalance: 0, note: "" }
];

const DEFAULT_FIXED_EXPENSES = [];

const CATEGORY_TREE = {
  "飲食": { icon: "🍜", color: "bg-orange-100 text-orange-700", sub: ["早餐", "午餐", "晚餐", "飲料點心", "外食聚餐", "麥當勞"] },
  "交通": { icon: "🚗", color: "bg-blue-100 text-blue-700", sub: ["加油", "停車", "大眾運輸", "計程車", "電池費"] },
  "購物": { icon: "🛍️", color: "bg-pink-100 text-pink-700", sub: ["衣服", "日用品", "3C家電", "書籍"] },
  "娛樂": { icon: "🎮", color: "bg-purple-100 text-purple-700", sub: ["玩具", "電影", "遊戲", "旅遊休閒"] },
  "家用": { icon: "🏠", color: "bg-green-100 text-green-700", sub: ["房租", "水電", "電信", "家庭雜支"] },
  "還錢": { icon: "💳", color: "bg-red-100 text-red-700", sub: ["信用卡", "貸款", "分期"] },
  "個人": { icon: "👤", color: "bg-teal-100 text-teal-700", sub: ["美容美髮", "醫療", "保險", "學貸"] },
  "月費": { icon: "📅", color: "bg-indigo-100 text-indigo-700", sub: ["訂閱服務", "網路電信", "會員費"] },
  "旅遊": { icon: "✈️", color: "bg-cyan-100 text-cyan-700", sub: ["機票住宿", "交通", "伙食", "紀念品"] },
  "收入": { icon: "💰", color: "bg-emerald-100 text-emerald-700", sub: ["薪資", "獎金", "兼差", "利息", "其他收入"] }
};

// 可自訂主類別的色票選擇
const CATEGORY_COLORS = [
  { label: "橘", value: "bg-orange-100 text-orange-700" },
  { label: "藍", value: "bg-blue-100 text-blue-700" },
  { label: "粉", value: "bg-pink-100 text-pink-700" },
  { label: "紫", value: "bg-purple-100 text-purple-700" },
  { label: "綠", value: "bg-green-100 text-green-700" },
  { label: "紅", value: "bg-red-100 text-red-700" },
  { label: "青", value: "bg-teal-100 text-teal-700" },
  { label: "靛", value: "bg-indigo-100 text-indigo-700" },
  { label: "天藍", value: "bg-cyan-100 text-cyan-700" },
  { label: "翠", value: "bg-emerald-100 text-emerald-700" },
  { label: "黃", value: "bg-yellow-100 text-yellow-700" },
  { label: "灰", value: "bg-gray-100 text-gray-700" }
];

// 當前合併後的類別樹(App render 時更新)
let __MERGED_CT__ = CATEGORY_TREE;

// 取得類別資訊(或完整樹):getCT() 回樹、getCT("飲食") 回單一類別
const getCT = (cat) => cat !== undefined ? __MERGED_CT__[cat] : __MERGED_CT__;

// 從 state 計算合併的類別樹(自訂 + 內建,排除隱藏)
const buildMergedCT = (state) => {
  const hidden = state?.hiddenMainCategories || [];
  const customs = state?.customCategories || [];
  const merged = {};
  Object.keys(CATEGORY_TREE).forEach(k => {
    if (!hidden.includes(k)) merged[k] = CATEGORY_TREE[k];
  });
  customs.forEach(c => {
    merged[c.name] = { icon: c.icon || "📌", color: c.color || "bg-gray-100 text-gray-700", sub: c.sub || [], custom: true };
  });
  return merged;
};

const DEFAULT_GOALS = [
  { id: "g1", name: "總儲蓄(目標10萬)", target: 100000, current: 0, note: "SNY 主要存款" },
  { id: "g2", name: "旅遊基金", target: 20000, current: 0, note: "" },
  { id: "g3", name: "緊急預備金", target: 50000, current: 0, note: "" }
];

const DEFAULT_BUDGET = {
  income: 35000,
  fixed: { 信用卡: 4335, 信貸: 5015, 固定房貸: 5000, 固定生活費: 3000, 固定交通費: 969 },
  savings: { 儲蓄: 4000, 旅費: 5000, 家庭支備金: 1000, 雜支預備: 1000, 學貸預備: 1000 }
};

// ===================== localStorage helpers =====================
const LS_KEY = "joyce-money-app-v1";

const loadState = () => {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
};

const saveState = (state) => {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
};

const todayStr = () => {
  const d = new Date();
  return d.toISOString().slice(0, 10);
};

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

const fmtMoney = (n) => {
  if (isNaN(n)) return "0";
  const sign = n < 0 ? "-" : "";
  return sign + "$" + Math.abs(Math.round(n)).toLocaleString();
};

const addMonths = (dateStr, months) => {
  const d = new Date(dateStr);
  const day = d.getDate();
  d.setDate(1);
  d.setMonth(d.getMonth() + months);
  const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  d.setDate(Math.min(day, lastDay));
  return d.toISOString().slice(0, 10);
};

// ===================== 主 App =====================
function App() {
  const [state, setState] = useState(() => {
    const saved = loadState();
    if (!saved) {
      return {
        transactions: [],
        installments: [],
        goals: DEFAULT_GOALS,
        accounts: DEFAULT_ACCOUNTS,
        stocks: [],
        budget: DEFAULT_BUDGET,
        monthlyIncomes: {},
        fixedExpenses: DEFAULT_FIXED_EXPENSES,
        customSubcategories: {}
      };
    }
    // 資料遷移:舊版帳戶是字串陣列,轉為物件
    if (saved.accounts && saved.accounts.length > 0 && typeof saved.accounts[0] === "string") {
      saved.accounts = saved.accounts.map(name => ({
        id: uid(),
        name,
        type: name.includes("信用卡") ? "信用卡" :
              name.includes("金融") || name.includes("提款") ? "金融卡" :
              name.includes("貸") ? "貸款" :
              (name.includes("Pay") || name.includes("支付") || name.includes("街口") || name.includes("Line")) ? "行動支付" :
              name === "現金" ? "現金" : "其他",
        last4: "", expire: "", statementDay: "", dueDay: "", creditLimit: "", benefits: "", annualFee: "", openingBalance: 0, note: ""
      }));
    }
    // 補欄位
    if (saved.accounts) {
      saved.accounts = saved.accounts.map(a => ({ openingBalance: 0, ...a }));
    }
    if (!saved.stocks) saved.stocks = [];
    if (!saved.fixedExpenses) saved.fixedExpenses = DEFAULT_FIXED_EXPENSES;
    if (!saved.customSubcategories) saved.customSubcategories = {};
    if (!saved.customCategories) saved.customCategories = [];
    if (!saved.hiddenMainCategories) saved.hiddenMainCategories = [];
    if (!saved.goalEntries) saved.goalEntries = [];
    if (!saved.ledgers) saved.ledgers = [];
    if (!saved.ledgerEntries) saved.ledgerEntries = [];
    if (!saved.customAccountTypes) saved.customAccountTypes = [];
    if (!saved.hiddenAccountTypes) saved.hiddenAccountTypes = [];
    return saved;
  });

  useEffect(() => { saveState(state); }, [state]);

  // 保持全域合併後的類別樹是最新的(供 TxRow 等非 ctx 元件使用)
  __MERGED_CT__ = useMemo(() => buildMergedCT(state), [state.customCategories, state.hiddenMainCategories]);
  // 同步帳戶類型快取
  useMemo(() => rebuildAccountTypes(state), [state.customAccountTypes, state.hiddenAccountTypes, state.builtinTypeOverrides]);

  const [tab, setTab] = useState("add");
  const [viewYear, setViewYear] = useState(new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(new Date().getMonth() + 1);

  // 新增交易(支援分期自動展開 + 手續費/利率)
  const addTransaction = (tx, installmentPeriods = 1, installmentMeta = {}) => {
    if (!tx.amount || tx.amount <= 0) return;
    if (installmentPeriods > 1) {
      const groupId = uid();
      const principal = parseFloat(tx.amount) || 0;
      const fee = parseFloat(installmentMeta.fee) || 0;
      const rate = parseFloat(installmentMeta.rate) || 0;
      // 若有年利率,估算總利息
      const estInterest = rate > 0 ? Math.round(principal * (rate / 100) * (installmentPeriods / 12)) : 0;
      const extraTotal = fee + estInterest;
      const totalAmount = principal + extraTotal;
      const perAmount = Math.round(totalAmount / installmentPeriods);
      const newTxs = [];
      for (let i = 0; i < installmentPeriods; i++) {
        const isFirst = i === 0;
        newTxs.push({
          ...tx,
          id: uid(),
          date: addMonths(tx.date, i),
          amount: perAmount,
          note: (tx.note ? tx.note + " " : "") + `(${i + 1}/${installmentPeriods}期)`,
          installmentGroupId: groupId,
          ...(isFirst ? {
            installmentPrincipal: principal,
            installmentFee: fee,
            installmentRate: rate,
            installmentEstInterest: estInterest,
            installmentPeriods
          } : {})
        });
      }
      setState(s => ({ ...s, transactions: [...s.transactions, ...newTxs] }));
    } else {
      setState(s => ({ ...s, transactions: [...s.transactions, { ...tx, id: uid() }] }));
    }
  };

  // 轉帳:產生一筆特殊交易(不計入收支)
  const addTransfer = (transfer) => {
    if (!transfer.amount || transfer.amount <= 0) return;
    setState(s => ({
      ...s,
      transactions: [...s.transactions, {
        id: uid(),
        type: "轉帳",
        date: transfer.date,
        amount: parseFloat(transfer.amount),
        fromAccount: transfer.fromAccount,
        toAccount: transfer.toAccount,
        account: transfer.fromAccount, // 兼容舊邏輯
        category: "轉帳",
        note: transfer.note || ""
      }]
    }));
  };

  const deleteTransaction = (id) => {
    setState(s => ({ ...s, transactions: s.transactions.filter(t => t.id !== id) }));
  };

  const updateTransaction = (id, updates) => {
    setState(s => ({
      ...s,
      transactions: s.transactions.map(t => t.id === id ? { ...t, ...updates } : t)
    }));
  };

  const deleteInstallmentGroup = (groupId) => {
    setState(s => ({ ...s, transactions: s.transactions.filter(t => t.installmentGroupId !== groupId) }));
  };

  // 舊版 API:僅改變 current,不記明細
  const updateGoal = (id, delta, note = "") => {
    setState(s => ({
      ...s,
      goals: s.goals.map(g => g.id === id ? { ...g, current: Math.max(0, g.current + delta) } : g)
    }));
  };

  // 新版:記一筆明細並同步 current 與綁定帳戶
  // entry: { goalId, type: "存入"|"提出", amount, date, note }
  const addGoalEntry = (entry) => {
    setState(s => {
      const goal = s.goals.find(g => g.id === entry.goalId);
      if (!goal) return s;
      const amt = parseFloat(entry.amount) || 0;
      const signed = entry.type === "存入" ? amt : -amt;
      const newEntry = {
        id: uid(),
        goalId: entry.goalId,
        type: entry.type,
        amount: amt,
        date: entry.date || todayStr(),
        note: entry.note || "",
        accountName: goal.accountName || ""
      };
      return {
        ...s,
        goals: s.goals.map(g =>
          g.id === entry.goalId
            ? { ...g, current: Math.max(0, (g.current || 0) + signed) }
            : g
        ),
        goalEntries: [...(s.goalEntries || []), newEntry]
      };
    });
  };

  const removeGoalEntry = (entryId) => {
    setState(s => {
      const entry = (s.goalEntries || []).find(e => e.id === entryId);
      if (!entry) return s;
      const signed = entry.type === "存入" ? -entry.amount : entry.amount;
      return {
        ...s,
        goals: s.goals.map(g =>
          g.id === entry.goalId
            ? { ...g, current: Math.max(0, (g.current || 0) + signed) }
            : g
        ),
        goalEntries: (s.goalEntries || []).filter(e => e.id !== entryId)
      };
    });
  };

  const addGoal = (goal, maybeTarget) => {
    // 支援舊的 (name, target) 與新的 object
    if (typeof goal === "string") {
      goal = { name: goal, target: maybeTarget, accountName: "" };
    }
    setState(s => ({
      ...s,
      goals: [...s.goals, {
        id: uid(),
        name: goal.name,
        target: parseFloat(goal.target) || 0,
        current: 0,
        note: goal.note || "",
        accountName: goal.accountName || "",
        mode: goal.mode || "goal"  // "goal" 有目標金額 / "piggy" 存錢筒不設上限
      }]
    }));
  };

  const updateGoalMeta = (id, updates) => {
    setState(s => ({
      ...s,
      goals: s.goals.map(g => g.id === id ? { ...g, ...updates } : g)
    }));
  };

  const removeGoal = (id) => {
    setState(s => ({
      ...s,
      goals: s.goals.filter(g => g.id !== id),
      goalEntries: (s.goalEntries || []).filter(e => e.goalId !== id)
    }));
  };

  // 產生貸款每月扣款交易
  const generateLoanTransactions = (acc) => {
    if (acc.type !== "貸款") return [];
    const principal = parseFloat(acc.loanPrincipal) || 0;
    const monthly = parseFloat(acc.loanMonthly) || 0;
    const periods = parseInt(acc.loanPeriods) || 0;
    const startDate = acc.loanStartDate;
    if (principal <= 0 || monthly <= 0 || periods <= 0 || !startDate) return [];
    const groupId = acc.loanGroupId || ("loan-" + acc.id);
    const txs = [];
    for (let i = 0; i < periods; i++) {
      const date = addMonths(startDate, i);
      txs.push({
        id: uid(),
        type: "支出",
        date,
        amount: monthly,
        category: "還錢",
        subcategory: "貸款",
        account: acc.name,
        note: `${acc.name} 第${i+1}/${periods}期`,
        installmentGroupId: groupId,
        installmentPeriod: i + 1,
        installmentTotal: periods,
        ...(i === 0 ? {
          installmentPrincipal: principal,
          installmentPeriods: periods,
          loanAccount: acc.name
        } : {})
      });
    }
    return txs;
  };

  const addAccount = (acc) => {
    if (!acc || !acc.name) return;
    const id = uid();
    const newAcc = { id, last4: "", expire: "", statementDay: "", dueDay: "", creditLimit: "", benefits: "", annualFee: "", note: "", ...acc };

    // 若為貸款且填齊還款資訊 → 自動生成每月扣款交易
    const loanTxs = newAcc.type === "貸款" ? generateLoanTransactions(newAcc) : [];
    if (loanTxs.length) {
      newAcc.loanGroupId = loanTxs[0].installmentGroupId;
    }
    setState(s => ({
      ...s,
      accounts: [...s.accounts, newAcc],
      transactions: [...s.transactions, ...loanTxs]
    }));
  };

  const updateAccount = (id, updates) => {
    setState(s => {
      const cur = s.accounts.find(a => a.id === id);
      if (!cur) return s;
      const next = { ...cur, ...updates };
      let transactions = s.accounts;
      // 若為貸款且還款資訊變動 → 重新生成該貸款交易(保留已手動新增的其他支出)
      let nextTxs = s.transactions;
      if (next.type === "貸款") {
        const keyChanged = (
          cur.loanPrincipal !== next.loanPrincipal ||
          cur.loanMonthly !== next.loanMonthly ||
          cur.loanPeriods !== next.loanPeriods ||
          cur.loanStartDate !== next.loanStartDate ||
          cur.name !== next.name
        );
        if (keyChanged) {
          const groupId = next.loanGroupId || cur.loanGroupId || ("loan-" + id);
          // 移除舊的貸款分期交易
          nextTxs = s.transactions.filter(t => t.installmentGroupId !== groupId);
          const regen = generateLoanTransactions({ ...next, id, loanGroupId: groupId });
          nextTxs = [...nextTxs, ...regen];
          next.loanGroupId = groupId;
        }
      }
      return {
        ...s,
        accounts: s.accounts.map(a => a.id === id ? next : a),
        transactions: nextTxs
      };
    });
  };

  const removeAccount = (id) => {
    setState(s => {
      const acc = s.accounts.find(a => a.id === id);
      let nextTxs = s.transactions;
      if (acc && acc.type === "貸款" && acc.loanGroupId) {
        const keep = confirm(`要同時刪除「${acc.name}」自動產生的每月扣款紀錄嗎?\n(按「取消」則保留已產生的交易)`);
        if (keep) nextTxs = s.transactions.filter(t => t.installmentGroupId !== acc.loanGroupId);
      }
      return {
        ...s,
        accounts: s.accounts.filter(a => a.id !== id),
        transactions: nextTxs
      };
    });
  };

  const addStock = (stock) => {
    setState(s => ({ ...s, stocks: [...s.stocks, { id: uid(), ...stock }] }));
  };

  const updateStock = (id, updates) => {
    setState(s => ({
      ...s,
      stocks: s.stocks.map(st => st.id === id ? { ...st, ...updates } : st)
    }));
  };

  const removeStock = (id) => {
    setState(s => ({ ...s, stocks: s.stocks.filter(st => st.id !== id) }));
  };

  const setMonthlyIncome = (ym, amount) => {
    setState(s => ({ ...s, monthlyIncomes: { ...s.monthlyIncomes, [ym]: amount } }));
  };

  const updateBudget = (newBudget) => {
    setState(s => ({ ...s, budget: newBudget }));
  };

  const addFixedExpense = (fe) => {
    setState(s => ({ ...s, fixedExpenses: [...(s.fixedExpenses || []), { id: uid(), endMonth: "", ...fe }] }));
  };
  const updateFixedExpense = (id, updates) => {
    setState(s => ({ ...s, fixedExpenses: (s.fixedExpenses || []).map(f => f.id === id ? { ...f, ...updates } : f) }));
  };
  const removeFixedExpense = (id) => {
    setState(s => ({ ...s, fixedExpenses: (s.fixedExpenses || []).filter(f => f.id !== id) }));
  };

  // ===== 主類別管理 =====
  const addCustomCategory = (cat) => {
    setState(s => {
      const cs = s.customCategories || [];
      if (cs.some(c => c.name === cat.name) || CATEGORY_TREE[cat.name]) {
        alert(`類別「${cat.name}」已存在`);
        return s;
      }
      return {
        ...s,
        customCategories: [...cs, {
          name: cat.name,
          icon: cat.icon || "📌",
          color: cat.color || "bg-gray-100 text-gray-700",
          sub: cat.sub || []
        }]
      };
    });
  };
  const updateCustomCategory = (oldName, updates) => {
    setState(s => ({
      ...s,
      customCategories: (s.customCategories || []).map(c =>
        c.name === oldName ? { ...c, ...updates } : c
      )
    }));
  };
  const removeCustomCategory = (name) => {
    setState(s => ({
      ...s,
      customCategories: (s.customCategories || []).filter(c => c.name !== name)
    }));
  };
  const toggleHiddenMainCategory = (name) => {
    setState(s => {
      const hidden = s.hiddenMainCategories || [];
      const next = hidden.includes(name)
        ? hidden.filter(h => h !== name)
        : [...hidden, name];
      return { ...s, hiddenMainCategories: next };
    });
  };

  // ===== 帳戶類型管理 =====
  const addAccountType = (name, icon) => {
    if (!name) return;
    setState(s => {
      const customs = s.customAccountTypes || [];
      if (BUILTIN_ACCOUNT_TYPES.includes(name) || customs.some(c => c.name === name)) {
        alert("已有同名類型"); return s;
      }
      return { ...s, customAccountTypes: [...customs, { name, icon: icon || "📦" }] };
    });
  };
  const updateAccountType = (oldName, newName, newIcon) => {
    setState(s => {
      const customs = s.customAccountTypes || [];
      const i = customs.findIndex(c => c.name === oldName);
      if (i < 0) return s;
      if (newName !== oldName && (BUILTIN_ACCOUNT_TYPES.includes(newName) || customs.some(c => c.name === newName))) {
        alert("已有同名類型"); return s;
      }
      const nextCustoms = [...customs];
      nextCustoms[i] = { name: newName, icon: newIcon };
      // 把用到此類型的帳戶也一起改
      const nextAccounts = s.accounts.map(a => a.type === oldName ? { ...a, type: newName } : a);
      return { ...s, customAccountTypes: nextCustoms, accounts: nextAccounts };
    });
  };
  const removeAccountType = (name) => {
    setState(s => {
      const customs = s.customAccountTypes || [];
      const used = s.accounts.some(a => a.type === name);
      if (used) { alert(`還有帳戶屬於「${name}」,請先刪除或移動後再刪此類型`); return s; }
      return { ...s, customAccountTypes: customs.filter(c => c.name !== name) };
    });
  };
  const toggleHiddenAccountType = (name) => {
    setState(s => {
      const used = s.accounts.some(a => a.type === name);
      const hidden = s.hiddenAccountTypes || [];
      const isHidden = hidden.includes(name);
      if (!isHidden && used) { alert(`還有帳戶屬於「${name}」,無法隱藏`); return s; }
      const next = isHidden ? hidden.filter(h => h !== name) : [...hidden, name];
      return { ...s, hiddenAccountTypes: next };
    });
  };
  // 編輯內建類型的顯示名稱與圖示(只改顯示,canonical key 不變)
  const updateBuiltinAccountType = (origName, newName, newIcon) => {
    if (!BUILTIN_ACCOUNT_TYPES.includes(origName)) return;
    setState(s => {
      const overrides = { ...(s.builtinTypeOverrides || {}) };
      const override = {};
      if (newName && newName !== origName) override.name = newName;
      if (newIcon && newIcon !== BUILTIN_ACCOUNT_TYPE_ICON[origName]) override.icon = newIcon;
      if (override.name || override.icon) overrides[origName] = override;
      else delete overrides[origName];
      return { ...s, builtinTypeOverrides: overrides };
    });
  };

  // ===== 帳本管理 =====
  const addLedger = (ledger) => {
    setState(s => ({
      ...s,
      ledgers: [...(s.ledgers || []), {
        id: uid(),
        name: ledger.name,
        type: ledger.type || "general",
        icon: ledger.icon || "📒",
        color: ledger.color || "bg-emerald-100 text-emerald-700",
        archived: false,
        createdAt: todayStr(),
        ...ledger
      }]
    }));
  };
  const updateLedger = (id, updates) => {
    setState(s => ({
      ...s,
      ledgers: (s.ledgers || []).map(l => l.id === id ? { ...l, ...updates } : l)
    }));
  };
  const removeLedger = (id) => {
    setState(s => ({
      ...s,
      ledgers: (s.ledgers || []).filter(l => l.id !== id),
      ledgerEntries: (s.ledgerEntries || []).filter(e => e.ledgerId !== id)
    }));
  };
  const archiveLedger = (id, archived = true) => {
    updateLedger(id, { archived });
  };
  const addLedgerEntry = (entry) => {
    setState(s => ({
      ...s,
      ledgerEntries: [...(s.ledgerEntries || []), { id: uid(), ...entry }]
    }));
  };
  const updateLedgerEntry = (id, updates) => {
    setState(s => ({
      ...s,
      ledgerEntries: (s.ledgerEntries || []).map(e => e.id === id ? { ...e, ...updates } : e)
    }));
  };
  const removeLedgerEntry = (id) => {
    setState(s => ({
      ...s,
      ledgerEntries: (s.ledgerEntries || []).filter(e => e.id !== id)
    }));
  };

  const addSubcategory = (mainCat, sub) => {
    if (!sub) return;
    setState(s => {
      const cs = { ...(s.customSubcategories || {}) };
      const list = cs[mainCat] || [];
      if (list.includes(sub)) return s;
      cs[mainCat] = [...list, sub];
      return { ...s, customSubcategories: cs };
    });
  };
  const removeSubcategory = (mainCat, sub) => {
    setState(s => {
      const cs = { ...(s.customSubcategories || {}) };
      const builtinList = getCT(mainCat)?.sub || [];
      if (builtinList.includes(sub)) {
        // 隱藏內建子類別(放到隱藏清單)
        const hidden = { ...(s.hiddenSubcategories || {}) };
        hidden[mainCat] = [...(hidden[mainCat] || []), sub];
        return { ...s, hiddenSubcategories: hidden };
      }
      cs[mainCat] = (cs[mainCat] || []).filter(x => x !== sub);
      return { ...s, customSubcategories: cs };
    });
  };

  // 取得某帳戶的目前餘額(金融卡/現金/行動支付)或本月信用卡已使用
  const getAccountBalance = (acc) => {
    const opening = parseFloat(acc.openingBalance) || 0;
    if (acc.type === "信用卡") {
      // 信用卡:本月(或本結帳週期)已使用金額
      const now = new Date();
      const thisMonth = now.toISOString().slice(0, 7);
      const used = state.transactions
        .filter(t => t.account === acc.name && t.date.startsWith(thisMonth) && t.type === "支出")
        .reduce((s, t) => s + t.amount, 0);
      const limit = parseFloat(acc.creditLimit) || 0;
      return { used, limit, remaining: limit - used, type: "credit" };
    }
    if (acc.type === "貸款") {
      // 貸款:顯示已還 / 總借款 / 剩餘
      const principal = parseFloat(acc.loanPrincipal) || 0;
      const monthly = parseFloat(acc.loanMonthly) || 0;
      const periods = parseInt(acc.loanPeriods) || 0;
      const totalRepay = monthly * periods;
      const today = todayStr();
      const paid = state.transactions
        .filter(t => t.account === acc.name && t.type === "支出" && t.installmentGroupId && t.date <= today)
        .reduce((s, t) => s + t.amount, 0);
      const scheduled = state.transactions
        .filter(t => t.account === acc.name && t.type === "支出" && t.installmentGroupId)
        .reduce((s, t) => s + t.amount, 0);
      return {
        type: "loan",
        principal,
        monthly,
        periods,
        totalRepay,
        paid,
        remaining: Math.max(0, totalRepay - paid),
        scheduled
      };
    }
    // 儲值型(金融卡/現金/行動支付/其他)
    const txs = state.transactions.filter(t => t.account === acc.name);
    const income = txs.filter(t => t.type === "收入").reduce((s, t) => s + t.amount, 0);
    const expense = txs.filter(t => t.type === "支出").reduce((s, t) => s + t.amount, 0);
    // 轉帳:轉出扣錢、轉入加錢
    const transferOut = state.transactions.filter(t => t.type === "轉帳" && t.fromAccount === acc.name).reduce((s, t) => s + t.amount, 0);
    const transferIn = state.transactions.filter(t => t.type === "轉帳" && t.toAccount === acc.name).reduce((s, t) => s + t.amount, 0);
    // 儲蓄目標存入:算成帳戶存款
    const goalIn = (state.goalEntries || []).filter(e => e.accountName === acc.name && e.type === "存入").reduce((s, e) => s + e.amount, 0);
    const goalOut = (state.goalEntries || []).filter(e => e.accountName === acc.name && e.type === "提出").reduce((s, e) => s + e.amount, 0);
    return {
      balance: opening + income - expense - transferOut + transferIn + goalIn - goalOut,
      income, expense, opening, transferOut, transferIn, goalIn, goalOut,
      type: "balance"
    };
  };

  // 匯出 JSON
  const exportData = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `記帳備份_${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.transactions) throw new Error("格式錯誤");
        setState(data);
        alert("匯入成功!");
      } catch (err) {
        alert("匯入失敗:" + err.message);
      }
    };
    reader.readAsText(file);
  };

  const ctx = {
    state, setState,
    addTransaction, addTransfer, deleteTransaction, updateTransaction, deleteInstallmentGroup,
    updateGoal, addGoal, removeGoal, updateGoalMeta, addGoalEntry, removeGoalEntry,
    addAccount, updateAccount, removeAccount, getAccountBalance,
    addStock, updateStock, removeStock,
    addFixedExpense, updateFixedExpense, removeFixedExpense,
    addSubcategory, removeSubcategory,
    addCustomCategory, updateCustomCategory, removeCustomCategory, toggleHiddenMainCategory,
    addAccountType, updateAccountType, removeAccountType, toggleHiddenAccountType, updateBuiltinAccountType,
    addLedger, updateLedger, removeLedger, archiveLedger,
    addLedgerEntry, updateLedgerEntry, removeLedgerEntry,
    setMonthlyIncome, updateBudget,
    exportData, importData,
    viewYear, setViewYear, viewMonth, setViewMonth
  };

  return (
    <div className="max-w-md mx-auto min-h-screen bg-gray-50 relative pb-24">
      {tab === "add" && <AddTab ctx={ctx} />}
      {tab === "calendar" && <CalendarTab ctx={ctx} />}
      {tab === "ccreview" && <CCReviewTab ctx={ctx} />}
      {tab === "compare" && <CompareTab ctx={ctx} />}
      {tab === "ledgers" && <LedgersTab ctx={ctx} />}
      {tab === "settings" && <SettingsTab ctx={ctx} />}

      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}
