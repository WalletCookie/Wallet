        </div>
        <div className="min-w-0 flex-1">
          <div className="text-sm font-medium truncate">
            {isTransfer ? `轉帳 ${t.fromAccount} → ${t.toAccount}` : (t.note || t.subcategory || t.category)}
          </div>
          <div className="text-xs text-gray-500 truncate">
            {isTransfer
              ? `${t.date}${t.note ? " · " + t.note : ""}`
              : `${t.date} · ${t.account} · ${t.category}${t.subcategory ? "/"+t.subcategory : ""}`}
          </div>
        </div>
      </button>
      <div className="flex items-center gap-1">
        <div className={`font-bold text-sm ${isTransfer ? "text-blue-500" : t.type === "支出" ? "text-red-500" : "text-green-500"}`}>
          {isTransfer ? "↔ " : t.type === "支出" ? "-" : "+"}{fmtMoney(t.amount)}
        </div>
        {onEdit && !isTransfer && (
          <button
            onClick={onEdit}
            className="text-gray-400 hover:text-blue-500 text-xs px-1.5 py-1"
            title="編輯"
          >✏️</button>
        )}
        <button
          onClick={onDelete}
          className="text-gray-400 hover:text-red-500 text-xs px-1.5 py-1"
          title="刪除"
        >✕</button>
      </div>
    </div>
  );
}

// ===================== 編輯交易 Modal =====================
function EditTxModal({ tx, ctx, onClose }) {
  const [form, setForm] = useState({
    type: tx.type,
    amount: tx.amount,
    category: tx.category,
    subcategory: tx.subcategory || "",
    date: tx.date,
    account: tx.account,
    note: tx.note || ""
  });

  const categoriesMap = getCT();
  const categories = Object.keys(categoriesMap).filter(c =>
    form.type === "收入" ? c === "收入" : c !== "收入"
  );

  const getSubcategories = (mainCat) => {
    const builtin = categoriesMap[mainCat]?.sub || [];
    const hidden = (ctx.state.hiddenSubcategories || {})[mainCat] || [];
    const custom = (ctx.state.customSubcategories || {})[mainCat] || [];
    return [...builtin.filter(s => !hidden.includes(s)), ...custom];
  };

  const save = () => {
    const amt = parseFloat(form.amount);
    if (!amt || amt <= 0) { alert("請輸入金額"); return; }
    ctx.updateTransaction(tx.id, {
      type: form.type,
      amount: amt,
      category: form.category,
      subcategory: form.subcategory,
      date: form.date,
      account: form.account,
      note: form.note
    });
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end sm:items-center justify-center p-2" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto p-4" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-bold text-lg">編輯交易</h3>
          <button onClick={onClose} className="text-gray-400 text-2xl leading-none">×</button>
        </div>

        {tx.installmentGroupId && (
          <div className="mb-3 bg-yellow-50 text-yellow-700 text-xs p-2 rounded">
            ⚠️ 這是分期交易的其中一筆,修改只會影響這一期,不會動到整組。
          </div>
        )}

        <div className="flex bg-gray-100 rounded-full p-1 mb-3">
          {["支出", "收入"].map(t => (
            <button
              key={t}
              onClick={() => {
                const newCat = t === "收入" ? "收入" : (form.category === "收入" ? "飲食" : form.category);
                setForm(f => ({ ...f, type: t, category: newCat, subcategory: "" }));
              }}
              className={`flex-1 py-2 rounded-full text-sm font-semibold transition ${
                form.type === t
                  ? (t === "支出" ? "bg-red-500 text-white" : "bg-green-500 text-white")
                  : "text-gray-500"
              }`}
            >{t}</button>
          ))}
        </div>

        <div className="mb-3">
          <input
            type="number"
            inputMode="decimal"
            value={form.amount}
            onChange={e => setForm(f => ({ ...f, amount: e.target.value }))}
            className="w-full text-3xl font-bold text-center py-3 border-b-2 border-gray-200 focus:border-blue-500 outline-none"
          />
        </div>

        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1">類別</div>
          <div className="grid grid-cols-4 gap-1.5">
            {categories.map(c => (
              <button
                key={c}
                onClick={() => setForm(f => ({ ...f, category: c, subcategory: "" }))}
                className={`py-2 rounded-lg text-xs transition ${
                  form.category === c ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"
                }`}
              >
                <div className="text-lg">{categoriesMap[c]?.icon}</div>
                <div>{c}</div>
              </button>
            ))}
          </div>
        </div>

        <div className="mb-3">
          <div className="text-sm text-gray-500 mb-1">子分類</div>
          <div className="flex flex-wrap gap-1.5">
            {getSubcategories(form.category).map(s => (
              <button
                key={s}
                onClick={() => setForm(f => ({ ...f, subcategory: s === f.subcategory ? "" : s }))}
                className={`px-3 py-1 rounded-full text-xs ${
                  form.subcategory === s ? "bg-blue-500 text-white" : "bg-gray-100 text-gray-700"
                }`}
              >{s}</button>
            ))}
          </div>
        </div>

        <div className="grid grid-cols-2 gap-2 mb-3">
          <div>
            <div className="text-sm text-gray-500 mb-1">日期</div>
            <input type="date" value={form.date}
              onChange={e => setForm(f => ({ ...f, date: e.target.value }))}
              className="w-full p-2 border border-gray-200 rounded"
            />
          </div>
          <div>
            <div className="text-sm text-gray-500 mb-1">帳戶</div>
            <select value={form.account}
              onChange={e => setForm(f => ({ ...f, account: e.target.value }))}
              className="w-full p-2 border border-gray-200 rounded bg-white"
            >
              {ACCOUNT_TYPES.map(t => {
                const accs = ctx.state.accounts.filter(a => a.type === t);
                if (accs.length === 0) return null;
                return (
                  <optgroup key={t} label={ACCOUNT_TYPE_ICON[t] + " " + ACCOUNT_TYPE_LABEL[t]}>
                    {accs.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                  </optgroup>
                );
              })}
            </select>
          </div>
        </div>

        <div className="mb-4">
          <div className="text-sm text-gray-500 mb-1">備註</div>
          <input type="text" value={form.note}
            onChange={e => setForm(f => ({ ...f, note: e.target.value }))}
            className="w-full p-2 border border-gray-200 rounded"
          />
        </div>

        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 bg-gray-200 text-gray-700 rounded-lg">取消</button>
          <button onClick={save} className="flex-1 py-2.5 bg-blue-500 text-white font-semibold rounded-lg">儲存</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
